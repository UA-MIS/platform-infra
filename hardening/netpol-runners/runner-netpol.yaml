# Runner isolation NetworkPolicies — arc-runners namespace (P2.3, §1.3, SEC gate).
#
# THE HEADLINE SECURITY CONTROL of the CI slice: self-hosted runners execute
# UNTRUSTED student PR code, so the runner namespace is the highest-risk surface on
# the platform. Default-deny everything, then allow ONLY what a build needs:
#   egress: DNS, Harbor (push/pull, in-cluster), and external HTTPS:443 (GitHub —
#           clone, Actions API, job-token exchange; Trivy/base-image pulls).
#   ingress: NONE from workloads (runners are clients, not servers) — only kubelet
#           probes from the node.
#
# ⚠ APISERVER BLOCK IS NON-NEGOTIABLE. The kube-apiserver lives on the NODE IPs
# (Talos: 10.237.171.{5,6,8}:6443 = the `kubernetes` Service endpoints) AND is
# reachable over the Tailscale overlay (endpoint 100.117.55.70:6443). Untrusted
# runner code must NOT be able to reach it (a reachable apiserver + any token =
# cluster escalation). So the external-egress rule EXCLUDES the node LAN segment,
# the TAILNET range (new on Talos — the overlay path to the apiserver did not exist
# on k3d), and the pod/svc CIDRs (blocks CROSS-TENANT reach + lateral movement).
# containerMode:kubernetes job pods DO need the apiserver to create their work pods,
# but that goes through the runner's ServiceAccount via the in-cluster `kubernetes`
# Service ClusterIP (10.96.0.1), NOT the node/overlay IP — see the scoped allow below.
#
# ⚠ ENFORCEMENT: these policies are INERT until a policy CNI is installed. Talos ships
# flannel (no NetworkPolicy backend) → every rule here is accepted but NOT enforced.
# Real enforcement requires the Cilium/Canal swap (separate maintenance-window task) +
# this CIDR re-param. External egress is still PORT-scoped (443), not host-scoped;
# Cilium would enable FQDN egress (tighten 443 to GitHub CIDRs/FQDNs) as a follow-up.
# CIDRs (Talos, live): pods 10.244.0.0/16, svc 10.96.0.0/12, nodes 10.237.168.0/22
# (LAN segment, apiserver :6443), tailnet 100.64.0.0/10. MANUAL-SYNC gated like
# SEC-011 (the Application applies nothing until a watched `argocd app sync` — see the
# arc-netpol Application), so default-deny is never auto-pushed onto a running build.

# --- default-deny (ingress + egress) for every pod in arc-runners ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zz-default-deny
  namespace: arc-runners
  labels:
    platform.capstone/component: platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# --- INGRESS: only kubelet health probes (from the node IP). Runners + job pods
#     are clients; nothing should connect INTO them from other workloads. ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-kubelet-probes
  namespace: arc-runners
  labels:
    platform.capstone/component: platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Kubelet readiness/liveness probes originate from the NODE IP, not a pod/ns.
    - from:
        - ipBlock:
            cidr: 10.237.168.0/22   # Talos node LAN segment (kubelet probe source)
---
# --- EGRESS: DNS + the in-cluster kubernetes API service (for containerMode:
#     kubernetes job-pod creation) + Harbor (in-cluster) + external HTTPS:443
#     (GitHub). Deliberately does NOT open the node CIDR wholesale (that would
#     expose the apiserver on the node IP); the runner reaches the API only via
#     the kubernetes Service ClusterIP in 10.43/16, scoped below. ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-scoped
  namespace: arc-runners
  labels:
    platform.capstone/component: platform
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS to CoreDNS (kube-system), UDP+TCP 53.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # In-cluster services ONLY (10.96/12): the `kubernetes` API Service (10.96.0.1
    # — containerMode:kubernetes job-pod orchestration via the runner SA, NOT the
    # node-IP/overlay apiserver) + Harbor's ClusterIP (harbor-core for push/pull). The
    # pod CIDR (10.244/16) is intentionally OMITTED so a runner cannot reach OTHER
    # teams' pods directly (cross-tenant block); it talks to services by ClusterIP only.
    #
    # PORT-SCOPED (SEC-014): a build needs ONLY the API (443) + harbor-core (80).
    # Leaving this all-ports let a runner reach arbitrary in-cluster service ports
    # (e.g. another team's in-namespace ClusterIP service, internal admin ports).
    # We keep the /16 (NOT /32 ClusterIP pins) because ClusterIPs are not stable
    # across the k3d recreate invariant — the /32 pin would go stale; /32-pinning is
    # deferred to Phase-3 (FQDN-capable CNI). 443 = kube-apiserver Service; 80 =
    # harbor-core (cleartext in-cluster, ClusterIP path only). Update if Harbor's
    # service port changes or a build needs another in-cluster service port.
    - to:
        - ipBlock:
            cidr: 10.96.0.0/12
      ports:
        - protocol: TCP
          port: 443    # kubernetes API Service (containerMode job-pod create)
        - protocol: TCP
          port: 80     # harbor-core (push/pull)
        # CILIUM POD-PORT ENFORCEMENT (the M1 registry-push gotcha, 2026-06-19): an
        # ipBlock egress rule is enforced against the DESTINATION POD port AFTER
        # kube-proxy/Cilium service translation, NOT the Service port. The Backstage
        # build pushes the image to Harbor via Traefik (hostAlias harbor.capstone ->
        # Traefik ClusterIP, to dodge Cloudflare's 100MB cap), and Traefik's websecure
        # Service :443 targetPorts to containerPort 8443 — so allowing only :443 above
        # DROPS the push (observed: `dial tcp 10.97.22.53:443: i/o timeout`). Allow the
        # Traefik pod port so the registry data plane reaches it. (8000 = Traefik's
        # `web` :80 targetPort, allowed symmetrically for completeness/http path.)
        - protocol: TCP
          port: 8443   # Traefik websecure pod port (:443 svc -> :8443 pod) — image push via Traefik
        - protocol: TCP
          port: 8080   # harbor-core pod port (:80 svc -> :8080 pod) — direct-core fallback path
    # External HTTPS:443 ONLY — GitHub (clone/Actions API/job token) + base-image
    # pulls. Port-scoped (no FQDN egress until Cilium).
    #
    # ⚠ CILIUM ENFORCEMENT CAVEAT (deny-test SEC-011; residual-risk finding SEC-019
    # = the Host Firewall / inert-node-except gap, tracked separately):
    # the pod/service excepts (10.244/16, 10.96/12) DO enforce — Cilium matches
    # those by managed-endpoint identity. BUT the node-LAN (10.237.168.0/22) and
    # tailnet (100.64.0.0/10) excepts are INERT under Cilium's DEFAULT config:
    # "CIDR-based selectors do not match in-cluster entities" — so an ipBlock except
    # does NOT match node / host / apiserver IDENTITIES. Two consequences proven by
    # the deny-test:
    #   (a) a runner reaching the apiserver via a control-plane NODE IP (:6443) is
    #       ALLOWED regardless (the CNP `toEntities: kube-apiserver` allows the
    #       apiserver identity = VIP + all node-IPs by UNION; an ipBlock except can't
    #       subtract from a CNP allow). ACCEPTED: RBAC on the runner SA is the
    #       control, not this except. NOT closable by CIDR (see apiserver-cnp.yaml).
    #   (b) the node-LAN/tailnet excepts only begin to enforce against OTHER-node /
    #       remote-node POD-egress paths once Cilium `policyCIDRMatchMode: nodes` is
    #       set; and even then a pod reaching its OWN node's host (reserved:host,
    #       e.g. that node's tailnet IP) is NOT policy-enforced at all without Cilium
    #       Host Firewall (`enableHostFirewall`). Both are tracked follow-ups.
    # So: do NOT trust these two excepts as a live control today. They express
    # INTENT + become real with policyCIDRMatchMode:nodes (other-node) + Host
    # Firewall (own-host). The apiserver-via-node-IP path stays RBAC-gated.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.244.0.0/16    # pods (cross-tenant + lateral) — ENFORCED (endpoint identity)
              - 10.96.0.0/12     # services — ENFORCED (covered by the scoped allow above)
              - 10.237.168.0/22  # NODE LAN incl. apiserver :6443 — INERT until policyCIDRMatchMode:nodes;
                                 # apiserver-via-node-IP stays ALLOWED by CNP union (RBAC-gated). See caveat above.
              - 100.64.0.0/10    # TAILNET (Talos overlay) — INERT until policyCIDRMatchMode:nodes (other-node)
                                 # + Host Firewall (own-node host). See caveat above.
      ports:
        - protocol: TCP
          port: 443
