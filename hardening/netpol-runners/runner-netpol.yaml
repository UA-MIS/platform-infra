# Runner isolation NetworkPolicies — arc-runners namespace (P2.3, §1.3, SEC gate).
#
# THE HEADLINE SECURITY CONTROL of the CI slice: self-hosted runners execute
# UNTRUSTED student PR code, so the runner namespace is the highest-risk surface on
# the platform. Default-deny everything, then allow ONLY what a build needs:
#   egress: DNS, Harbor (push/pull, in-cluster), and external HTTPS:443 (GitHub —
#           clone, Actions API, job-token exchange; Trivy/base-image pulls).
#   ingress: NONE from workloads (runners are clients, not servers) — only kubelet
#           probes from the node.
#
# ⚠ APISERVER BLOCK IS NON-NEGOTIABLE. The kube-apiserver lives on the NODE IPs
# (10.89.0.0/24 :6443 on k3d). Untrusted runner code must NOT be able to reach it
# (a reachable apiserver + any token = cluster escalation). So the external-egress
# rule EXCLUDES the node CIDR (and the pod/svc CIDRs — that blocks CROSS-TENANT
# reach + in-cluster lateral movement). containerMode:kubernetes job pods DO need
# the apiserver to create their work pods, but that goes through the runner's
# ServiceAccount via the in-cluster `kubernetes` Service — see the scoped allow
# below (tightly limited to the kubernetes service ClusterIP, NOT the whole node).
#
# Same k3s embedded kube-router constraints as the SEC-009 control-plane netpols:
# NO FQDN/DNS egress — external egress is PORT-scoped (443), not host-scoped.
# Phase-3 tightens 443 to GitHub's published CIDRs (or an FQDN-capable CNI like
# Cilium). CIDRs (this cluster): pods 10.42.0.0/16, svc 10.43.0.0/16, nodes
# 10.89.0.0/24 (apiserver :6443). MANUAL-SYNC gated like SEC-011 (the Application
# applies nothing until a watched `argocd app sync` — see arc-netpol Application),
# so default-deny is never auto-pushed onto a running build mid-flight.

# --- default-deny (ingress + egress) for every pod in arc-runners ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zz-default-deny
  namespace: arc-runners
  labels:
    platform.capstone/component: platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# --- INGRESS: only kubelet health probes (from the node IP). Runners + job pods
#     are clients; nothing should connect INTO them from other workloads. ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-kubelet-probes
  namespace: arc-runners
  labels:
    platform.capstone/component: platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Kubelet readiness/liveness probes originate from the NODE IP, not a pod/ns.
    - from:
        - ipBlock:
            cidr: 10.89.0.0/24
---
# --- EGRESS: DNS + the in-cluster kubernetes API service (for containerMode:
#     kubernetes job-pod creation) + Harbor (in-cluster) + external HTTPS:443
#     (GitHub). Deliberately does NOT open the node CIDR wholesale (that would
#     expose the apiserver on the node IP); the runner reaches the API only via
#     the kubernetes Service ClusterIP in 10.43/16, scoped below. ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-scoped
  namespace: arc-runners
  labels:
    platform.capstone/component: platform
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS to CoreDNS (kube-system), UDP+TCP 53.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # In-cluster services ONLY (10.43/16): the `kubernetes` API Service (10.43.0.1
    # — containerMode:kubernetes job-pod orchestration via the runner SA, NOT the
    # node-IP apiserver) + Harbor's ClusterIP (harbor-core for push/pull). The pod
    # CIDR (10.42/16) is intentionally OMITTED so a runner cannot reach OTHER teams'
    # pods directly (cross-tenant block); it talks to services by ClusterIP only.
    - to:
        - ipBlock:
            cidr: 10.43.0.0/16
    # External HTTPS:443 ONLY — GitHub (clone/Actions API/job token) + base-image
    # pulls. Port-scoped (kube-router has no FQDN egress). The except list BLOCKS
    # the apiserver (node CIDR :6443) + all intra-cluster ranges, so "external"
    # truly means off-cluster — no apiserver, no cross-tenant, no node access.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.42.0.0/16    # pods (cross-tenant + lateral) — blocked
              - 10.43.0.0/16    # services (covered by the scoped allow above)
              - 10.89.0.0/24    # NODES incl. apiserver :6443 — BLOCKED (non-negotiable)
      ports:
        - protocol: TCP
          port: 443
