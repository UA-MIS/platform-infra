# Control-plane NetworkPolicies — external-secrets namespace (ADR-030 B1, SEC-ESO-2).
#
# ESO (controller + webhook + cert-controller) needs: egress to Vault (:8200), the
# apiserver (it WRITES Secrets into tenant namespaces + reads SecretStores/ES), and
# DNS; ingress for the validating webhook (from the apiserver) + kubelet probes.
# Everything else is denied — ESO holds broad Secret-write privilege, so fencing its
# network blast radius is the compensating control (SEC-ESO-2).
#
# Lives in hardening/netpol-controlplane/ so it inherits the MANUAL-SYNC Application
# (platform-netpol-controlplane) — same lockout-avoidance + SEC-011 live-apply gate
# as the other control-plane netpols. ADDITIVE (OR) alongside the Cilium CNPs.
#
# Talos/Cilium CIDRs: pods 10.244.0.0/16, services 10.96.0.0/12,
# nodes 10.237.168.0/22 (apiserver :6443 + webhook ingress from the node IP).

# --- default-deny (ingress + egress) for every pod in external-secrets ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zz-default-deny
  namespace: external-secrets
  labels:
    platform.capstone/component: platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# --- INGRESS: the apiserver -> ESO validating webhook (:10250) + kubelet probes.
#     The kube-apiserver dials the webhook from a node IP, so the node CIDR covers
#     both the webhook call and the readiness/liveness probes. ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-webhook-and-probes
  namespace: external-secrets
  labels:
    platform.capstone/component: platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # apiserver -> validating webhook + kubelet -> probes (both originate node IPs).
    - from:
        - ipBlock:
            cidr: 10.237.168.0/22
---
# --- EGRESS: DNS, intra-cluster (reach the Vault svc ClusterIP :8200), and the
#     apiserver (ESO reconciles ExternalSecrets cluster-wide + WRITES the resulting
#     Secrets into tenant namespaces). NO external egress (the store is in-cluster
#     Vault; ESO talks to no external provider in B1). ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-scoped
  namespace: external-secrets
  labels:
    platform.capstone/component: platform
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS to CoreDNS (kube-system), UDP+TCP 53.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Intra-cluster: reach the Vault Service ClusterIP (10.96/12) + the Vault pod
    # (10.244/16) on :8200 (the ESO->Vault read path). Pod+service CIDRs cover both.
    - to:
        - ipBlock:
            cidr: 10.244.0.0/16
        - ipBlock:
            cidr: 10.96.0.0/12
    # kube-apiserver on the node IPs (:6443) — ESO reads ExternalSecret/SecretStore
    # CRs and WRITES the materialized Secrets into tenant namespaces via the API.
    - to:
        - ipBlock:
            cidr: 10.237.168.0/22
      ports:
        - protocol: TCP
          port: 6443
