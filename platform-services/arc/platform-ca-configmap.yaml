# Platform CA (cert-manager platform-ca-issuer) — the CA that signed the wildcard
# cert Traefik serves on the in-cluster registry path (harbor.capstone via hostAlias).
# Mounted into the Kaniko build pod (hook-template) at /kaniko/ssl/certs/ so the PUSH
# verifies Traefik's cert instead of skipping TLS. The CA cert is PUBLIC (not secret).
# ⚠ COMMITTED COPY — if cert-manager rotates the platform CA this goes stale; the
#   proper auto-distributing fix is a cert-manager trust-manager Bundle (post-demo TODO).
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-ca
  namespace: arc-runners
  labels:
