---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: harbor-push
  namespace: arc-runners
# Repointed from the backstage CI robot (robot$backstage+backstage-ci-push) to the
# v1check CI push robot (robot$v1check+v1check-ci-push) for the v1check golden-path
# build (option A, team-lead call). This is the SINGLE shared arc-runners/harbor-push
# secret the hook-template mounts into every Kaniko build pod; repointing it aims the
# runner fleet at the v1check Harbor project. Same pattern as the temp-repoint in
# PR #91 (reverted by #95) but landed deliberately. The colliding tenant-dir copy
# (tenants/team-v1check/harbor-push-sealed.yaml) is DELETED in this PR to clear the
# ArgoCD SharedResourceWarning (two apps owning arc-runners/harbor-push).
# Sealed strict to name=harbor-push, namespace=arc-runners (unchanged), so it
# decrypts in place. Follow-up B (post-v1): per-team `secretName` for real
# multi-tenant CI so the fleet isn't a single-team secret.
spec:
  encryptedData:
    .dockerconfigjson: 
  template:
    metadata:
      name: harbor-push
      namespace: arc-runners
    type: kubernetes.io/dockerconfigjson
