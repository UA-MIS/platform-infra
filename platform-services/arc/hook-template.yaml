# ARC container-hook extension template (P2.3, §1.3, D-032) — injects the Harbor
# PUSH credential into the BUILD job-step pod ONLY (Option C, the only one that
# works in containerMode:kubernetes).
#
# WHY: in containerMode:kubernetes the workflow build runs in its OWN job-step pod
# (a `container:` step — ARC requires job containers in k8s mode), NOT on the
# runner pod. A volume on the runner pod is invisible to it. The k8s container hook
# MERGES this template's pod-spec patch into every job-step pod it creates, so the
# `harbor-push` Secret lands inside the Kaniko build container at
# /kaniko/.docker/config.json (Kaniko's default DOCKER_CONFIG dir) — the workflow
# needs ZERO cred-handling steps; Kaniko just finds it.
#
# SECURITY (resolves the A-vs-C question in C's favour): the push cred is projected
# ONLY into the build job-step container, NEVER onto the general runner pod — so
# untrusted NON-build workflow steps cannot read it. Combined with the
# least-privilege robot (push to the team's OWN Harbor project only,
# `make harbor-push-robot`) + ephemeral runners, this is the tight option.
#
# `optional: true` so a job container still starts before a team's harbor-push
# Secret is sealed (a build that needs it fails at push with a clear auth error,
# not at pod start). `$job` is the ARC convention for the job-step container.
# Mounted on the runner pod + referenced via ACTIONS_RUNNER_CONTAINER_HOOK_TEMPLATE
# (see applicationsets/arc-runner-scaleset-app.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: arc-hook-template
  namespace: arc-runners
  labels:
    platform.capstone/component: platform
data:
  content: |
    spec:
      # Resolve the Harbor registry host to Traefik IN-CLUSTER so the Kaniko PUSH
      # never traverses the Cloudflare edge (CF Free/Pro caps request bodies at 100MB
      # → a >100MB image layer 413s). The public host externally resolves to the
      # CF-proxied wildcard; this hostAlias points the build pod straight at Traefik's
      # ClusterIP, which terminates the wildcard TLS and routes by SNI to harbor-core.
      # The image ref stays harbor.capstone.uamishub.com (TLS/cert/tags unchanged).
      #
      # ⚠ HARDCODED Traefik ClusterIP (10.97.22.53) — stable unless the traefik Service
      # is recreated. Known debt: the Talos-native CoreDNS split-horizon (backlog item
      # B) retires this hardcode cluster-wide. coredns-custom does NOT work on Talos
      # (k3s *.override import absent) — see platform-services/coredns-custom header.
      # If a build 413s/cannot-resolve harbor, re-check this IP:
      #   kubectl -n kube-system get svc traefik -o jsonpath='{.spec.clusterIP}'
      hostAliases:
        - ip: "10.97.22.53"
          hostnames:
            - harbor.capstone.uamishub.com
      containers:
        - name: "$job"
          volumeMounts:
            - name: harbor-push
              mountPath: /kaniko/.docker
              readOnly: true
            # Trust the PLATFORM CA so the push VERIFIES Traefik's wildcard cert
            # (the in-cluster registry path serves the cert-manager-issued internal
            # cert, NOT Cloudflare's). Kaniko appends any cert under /kaniko/ssl/certs
            # to its trust store, so TLS verification stays ON (no --skip-tls-verify).
            - name: platform-ca
              mountPath: /kaniko/ssl/certs/platform-ca.crt
              subPath: ca.crt
              readOnly: true
      volumes:
        - name: harbor-push
          secret:
            secretName: harbor-push
            optional: true
            items:
              - key: .dockerconfigjson
                path: config.json
        - name: platform-ca
          configMap:
            name: platform-ca
            optional: true
            items:
              - key: ca.crt
                path: ca.crt
