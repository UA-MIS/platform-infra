# ARC PREREQS (P2.3, §1.3, D-032) — the namespaces that must exist before the ARC
# Helm Applications (applicationsets/arc-*-app.yaml) install. Managed by the
# platform-services-appset (kustomize directory generator over platform-services/*;
# this dir produces app `platform-svc-arc`). The two Helm charts (controller +
# runner scale set) are SEPARATE Helm-source Applications (method A, D-028) and do
# NOT render through this kustomize dir.
#
# The GitHub App credential is a SealedSecret added here ONCE the human creates the
# GitHub App (see README.md "GitHub App" — it carries github_app_id /
# github_app_installation_id / github_app_private_key). The human sealed it (PR #24)
# and it is now referenced in `resources` below; the scale-set's `githubConfigSecret:
# arc-github-app` materialises from it. (A NEW App credential = re-seal the file with
# `make seal NS=arc-runners` and recommit — never commit an unsealed Secret.)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - sealedsecret-github-app.yaml   # the human's sealed GitHub App creds (arc-github-app)
  - hook-template.yaml             # container-hook: injects harbor-push into the build job pod (Option C)
  - sealedsecret-harbor-push.yaml
labels:
  - pairs:
      platform.capstone/component: platform
    includeSelectors: false
