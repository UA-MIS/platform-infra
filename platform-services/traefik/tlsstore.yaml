# Default TLSStore (§5.2) — makes the bundled Traefik serve the cert-manager
# wildcard cert for ANY HTTPS host that has no more-specific certificate.
#
# Traefik's `default` TLSStore is special: its defaultCertificate is used for
# every TLS handshake whose SNI doesn't match a per-router cert. Since the
# wildcard covers *.${PLATFORM_DOMAIN}, a single Ingress with TLS but no secret
# reference still gets served the wildcard. The secret is the one cert-manager
# writes (wildcard-certificate.yaml) into kube-system, where Traefik runs.
#
# CRD: traefik.io/v1alpha1 TLSStore (the bundled Traefik ships these CRDs).
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: kube-system
  labels:
    platform.capstone/component: platform
  annotations:
    # Apply after cert-manager has produced the wildcard secret.
    argocd.argoproj.io/sync-wave: "6"
spec:
  defaultCertificate:
    secretName: wildcard-platform-tls
