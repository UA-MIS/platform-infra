# CoreDNS custom rewrite (P2.1-fix2) — split-horizon DNS for the OIDC issuer.
#
# ⚠⚠ TALOS-INERT — THIS CONFIGMAP DOES NOTHING ON THE TALOS CLUSTER (verified
# 2026-06-19). It relies on the k3s/k3d convention where CoreDNS imports
# `/etc/coredns/custom/*.override` into the `.:53` block. The TALOS CoreDNS is stock
# upstream: its Corefile has NO `import` directive and this ConfigMap is NOT mounted
# into the coredns pods (and the `coredns` ConfigMap is Talos-managed —
# owning-inventory talos-bootstrap-manifests-inventory — so a manual Corefile edit is
# reverted on reconcile). Proof: in-cluster, BOTH id.capstone.uamishub.com AND
# harbor.capstone.uamishub.com resolve to Cloudflare edge IPs, NOT Traefik.
#
# CONSEQUENCE: in-cluster split-horizon is achieved per-workload via `hostAliases`
# instead (harbor: ARC hook-template + the Backstage deploy → Traefik ClusterIP, to
# dodge Cloudflare's 100MB body cap on image push/pull). The id-issuer rewrite below
# is also inert — in-cluster OIDC discovery currently egresses via Cloudflare (fine
# for small requests). BACKLOG: a Talos-native CoreDNS machine-config patch
# (clusters/real-talos) would restore real cluster-wide split-horizon and retire this
# file + the hostAliases hardcodes. Until then THIS FILE IS A NO-OP — do not trust it.
#
# THE PROBLEM: the dashed-sslip convention (D-003) makes id.${PLATFORM_DOMAIN}
# resolve to 127.0.0.1 EVERYWHERE — including inside pods. That is correct for a
# browser on the host (127.0.0.1:443 -> host-mapped Traefik), but ArgoCD-server
# must fetch the issuer's discovery doc SERVER-SIDE
# (https://id.capstone.uamishub.com/.well-known/openid-configuration). Inside the
# pod, 127.0.0.1:443 is the pod's own loopback — nothing listens -> "connection
# refused", and SSO login 500s. Every tool that federates through Dex
# (Backstage/Grafana/Harbor, §1.1) hits the same wall.
#
# THE FIX: k3s/k3d CoreDNS imports `/etc/coredns/custom/*.override` into the
# `.:53` server block (see the stock Corefile). This ConfigMap (named
# `coredns-custom`, the k3s-watched name) adds a `rewrite` so that IN-CLUSTER DNS
# for the issuer host resolves to Traefik's STABLE service FQDN instead of
# 127.0.0.1. The request then goes pod -> Traefik ClusterIP:443, Traefik routes by
# Host/SNI (`id.capstone.uamishub.com`) to the Dex Ingress -> Dex. The issuer URL is
# byte-identical inside and outside the cluster (OIDC requires the discovery
# `issuer` to match exactly), and there is NO hardcoded IP — Traefik's
# `traefik.kube-system.svc.cluster.local` name is resolved by kube-dns.
#
# For `rewrite name exact`, CoreDNS automatically rewrites the ANSWER name back to
# the original query name (`id.capstone.uamishub.com`), so the client still sees the
# issuer host — keeps TLS SNI / issuer matching clean. (The explicit `answer auto`
# keyword is only for the block/`name suffix` form, not this inline `exact` form.)
#
# Managed by the platform-services-appset (one Application per dir). CoreDNS hot-
# reloads the imported override (the Corefile has `reload`), no pod restart needed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
  labels:
    platform.capstone/component: platform
data:
  # Filename must end in `.override` to be imported into the `.:53` block.
  id-issuer.override: |
    rewrite name exact id.capstone.uamishub.com traefik.kube-system.svc.cluster.local
  # Registry DATA PLANE must stay in-cluster — never traverse Cloudflare. The public
  # host `harbor.capstone.uamishub.com` resolves (externally) to the CF-proxied
  # wildcard, and CF Free/Pro caps request bodies at 100MB. A container image push
  # (or pull) sends layers far larger than that, so an in-cluster client pushing to
  # the PUBLIC host goes pod -> CF edge -> tunnel and each >100MB layer gets a 413
  # "Request Entity Too Large" (a Cloudflare HTML error page, not Harbor). This
  # broke the first ARC/Kaniko push of the Backstage image.
  #
  # FIX (same split-horizon pattern as the issuer above): rewrite the host IN-CLUSTER
  # to Traefik's service FQDN, so the ARC runner (push) and the Backstage deploy
  # (pull) hit Traefik ClusterIP:443 directly -> Traefik routes by SNI to the Harbor
  # ingress -> harbor-core, bypassing the CF edge + its 100MB cap. CoreDNS rewrites
  # the answer name back to harbor.capstone.uamishub.com, so TLS SNI + the wildcard
  # cert + the image reference all stay byte-identical (robots/tags/deploy refs
  # unchanged). Traefik terminates TLS with the internal wildcard TLSStore cert and
  # has NO buffering/maxRequestBodyBytes middleware (verified) -> streams the large
  # push with no size limit. The PUBLIC host still serves the Harbor UI externally
  # via CF (UI requests are small; only the data plane needs the internal path).
  # Foundational: EVERY tenant build push + workload pull needs this, not just M1.
  harbor-registry.override: |
    rewrite name exact harbor.capstone.uamishub.com traefik.kube-system.svc.cluster.local
