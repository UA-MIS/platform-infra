# ⚠ PLACEHOLDER — DO NOT MERGE AS-IS. The encryptedData below is a non-functional
# stub. Replace this entire file with REAL sealed output before merge:
#
#   1. Human creates the tunnel in Cloudflare (Zero-Trust -> Networks -> Tunnels ->
#      "capstone") and copies the TOKEN (eyJhIjoi...).
#   2. Seal it AGAINST THE LIVE TALOS CONTROLLER (uses the migrated sealing key, so
