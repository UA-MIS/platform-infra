# Cloudflare Tunnel token — SealedSecret (P3, §5, D-036).
#
# REAL sealed token (replaces the prior placeholder stub). Sealed by the human via
# `kubeseal --controller-namespace kube-system --controller-name sealed-secrets-controller`
# against the LIVE Talos sealed-secrets controller (shares the migrated platform
# sealing key). Decrypts in-cluster to Secret `cloudflared-tunnel-token` (key `token`)
# in namespace `cloudflared` — the cloudflared Deployment reads TUNNEL_TOKEN from it.
# The unsealed token is NEVER committed; only this encryptedData ciphertext is.
# kubeseal binds the ciphertext to name+namespace (cloudflared-tunnel-token /
# cloudflared) — do NOT rename/move it or it will fail to decrypt.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cloudflared-tunnel-token
  namespace: cloudflared
spec:
  encryptedData:
    token: 
  template:
    metadata:
      name: cloudflared-tunnel-token
      namespace: cloudflared
    type: Opaque
