#
#        set -x KUBECONFIG /home/ccsmith33/Projects/Capstone-Modernization/.wt-talos/clusters/real-talos/talos-kubeconfig
#        kubectl create secret generic cloudflared-tunnel-token \
#          --namespace cloudflared \
#          --from-literal=token='eyJhIjoi...PASTE_THE_REAL_TUNNEL_TOKEN...' \
#          --dry-run=client -o yaml \
#        | kubeseal \
#          --controller-namespace kube-system \
#          --controller-name sealed-secrets-controller \
#          --format yaml \
#        > platform-services/cloudflared/sealedsecret-tunnel-token.yaml
#
#      (kubeseal fetches the cert from the live controller via the current
#      kube-context — make sure KUBECONFIG points at the Talos cluster, not k3d.)
#   3. Verify the written file has real `encryptedData.token: Agxxxx...` (NOT this
