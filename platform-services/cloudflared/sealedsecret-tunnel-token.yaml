#
# The token is a BOOTSTRAP SECRET (grants tunnel connect rights) — treat like any
# other sealed credential: only the encrypted form is committed.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cloudflared-tunnel-token
  namespace: cloudflared
spec:
  encryptedData:
    token: REPLACE_WITH_SEALED_TUNNEL_TOKEN   # `make seal`/kubeseal output (Ag...)
  template:
    metadata:
      name: cloudflared-tunnel-token
      namespace: cloudflared
    type: Opaque
