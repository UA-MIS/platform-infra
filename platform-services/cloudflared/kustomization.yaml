# cloudflared (P3, §5 ingress, D-036) — the Cloudflare Tunnel connector that exposes
# the platform at *.capstone.uamishub.com. Managed by the platform-services-appset
# (kustomize directory generator over platform-services/*; this dir produces app
# `platform-svc-cloudflared`). Unlike Harbor/ARC/Rook, cloudflared is NOT a Helm chart
# — the Deployment + namespace + tunnel-token SealedSecret all render through here.
#
# ⚠ THE SEALEDSECRET LINE IS COMMENTED OUT until the human seals the REAL tunnel token
# (see sealedsecret-tunnel-token.yaml for the exact kubeseal command). Keeping it out of
# `resources` lets this app sync cleanly (namespace + Deployment) on first apply; the
# Deployment will sit waiting for the `cloudflared-tunnel-token` Secret. When the human
# seals the token: replace the placeholder file with the real sealed output AND uncomment
# the resources line below, in the SAME commit. (Committing the placeholder into resources
# would fail the controller's decrypt and leave the app perpetually degraded.)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - deployment.yaml
  # - sealedsecret-tunnel-token.yaml   # UNCOMMENT once sealed with the real token (see that file)

labels:
  - pairs:
      platform.capstone/component: platform
    includeSelectors: false
