# cloudflared (P3, §5 ingress, D-036) — the Cloudflare Tunnel connector that exposes
# the platform at *.capstone.uamishub.com. Managed by the platform-services-appset
# (kustomize directory generator over platform-services/*; this dir produces app
# `platform-svc-cloudflared`). Unlike Harbor/ARC/Rook, cloudflared is NOT a Helm chart
# — the Deployment + namespace + tunnel-token SealedSecret all render through here.
#
# The SealedSecret IS now rendered (the real tunnel token was sealed in #48). It
# decrypts in-cluster to Secret `cloudflared-tunnel-token`, which the Deployment
# mounts as TUNNEL_TOKEN. (Was commented out pre-seal so the app could sync cleanly
# with just namespace + Deployment; #48 sealed the real token but missed uncommenting
# this line — that gap left the app Synced-but-Degraded with NO SealedSecret CR and
# no Secret. This fix completes that step.)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - deployment.yaml
  - sealedsecret-tunnel-token.yaml

labels:
  - pairs:
      platform.capstone/component: platform
    includeSelectors: false
