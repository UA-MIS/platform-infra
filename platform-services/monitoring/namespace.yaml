# monitoring namespace (Observability, retro #3). Home for the kube-prometheus-stack
# (Prometheus / Alertmanager / Grafana / node-exporter / kube-state-metrics), Loki,
# and Alloy — all installed as SEPARATE Helm-source Applications
# (applicationsets/{kube-prometheus-stack,loki,alloy}-app.yaml, deploy method A). This
# kustomize dir ships the namespace those apps install into PLUS the platform alert
# rules + the cross-component scrape configs (same split as vault/external-secrets:
# the dir ships the ns + CRs, the chart is its own app).
#
# Generated as `platform-svc-monitoring` by the platform-services-appset (git
# directory generator over platform-services/*). This object is the declarative
# (tracked) owner of the namespace. The Helm apps (kube-prometheus-stack, loki, alloy)
# ALSO set CreateNamespace=true so none of them blocks on the ns existing first
# (sync-deadlock fix #127) — that is an idempotent create-if-missing, not
# managedNamespaceMetadata, so it does not conflict with this manifest's ownership.
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    platform.capstone/component: platform
