# Observability platform-service (retro #3) — the `monitoring` namespace + the
# platform alert rules + the cross-component scrape configs. The actual stacks
# (kube-prometheus-stack, Loki, Alloy) are SEPARATE Helm-source Applications
# (applicationsets/{kube-prometheus-stack,loki,alloy}-app.yaml, deploy method A) — the
# same split as harbor/vault/external-secrets (the dir ships the ns + CRs, the chart
# is its own app), so they do NOT render through this dir.
#
# Generated as `platform-svc-monitoring` by the platform-services-appset (git
# directory generator over platform-services/*).
#
# ⚠ ORDERING (sync-deadlock fix #127): alerts.yaml (PrometheusRule) +
# servicemonitors.yaml (ServiceMonitor / PodMonitor) are instances of CRDs installed
# by platform-kube-prometheus-stack. On a fresh cluster those CRDs may not exist when
# this app first syncs — WITHOUT mitigation ArgoCD's dry-run rejects the whole sync
# ("one or more synchronization tasks are not valid") and, combined with the stack
# previously waiting on this app to create the ns, neither could go first (deadlock).
# Each CR now carries `argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true`
# (skip the dry-run on the missing type) + sync-wave "1" (after the Namespace);
# ArgoCD's retry/selfHeal then applies them once the CRDs register.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - alerts.yaml
  - servicemonitors.yaml

labels:
  - pairs:
      platform.capstone/component: platform
    includeSelectors: false
