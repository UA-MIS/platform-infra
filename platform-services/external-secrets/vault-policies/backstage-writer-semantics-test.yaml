# Backstage WRITE-path semantics test (#108) — runs AS the `backstage-writer` IDENTITY
# (SA backstage-vault-writer, NOT root), mirroring vaultClient.ts:
#   login POST /v1/auth/kubernetes/login {jwt,role}  -> client_token
#   set   PATCH /v1/secret/data/<p> (application/merge-patch+json {data:{k:v}}); 404/405 -> POST create
#   del   PATCH merge-patch {data:{k:null}}  (JSON merge-patch null removes ONE key, siblings kept)
#
# Proves NON-DESTRUCTIVE single-key semantics on a throwaway path:
#   put A+B -> patch C -> assert A,B,C present -> delete B via null -> assert A,C survive & B gone.
#
# WHY a Job (not host CLI): Vault is in-cluster ClusterIP/TLS (no host ingress), and we must
# present the SA's audience=vault projected token — so the test runs in-cluster as that SA.
# This exercises the FULL real path incl. the audience gotcha. Root is never used.
#
# PREREQS: Step 1 (backstage-role.sh -> role/policy backstage-writer) + the SA
# backstage-vault-writer exist (Step 2 / PR #109). Throwaway path under the policy's
# secret/data/tenants/* scope so the writer identity is actually authorized.
#
# RUN:    kubectl --context admin@capstone apply -f THIS_FILE
#         kubectl --context admin@capstone -n backstage logs job/backstage-writer-semantics-test -f
# VERIFY (read-only): job condition=complete + the log ends "SEMANTICS-TEST: PASS".
# CLEANUP: kubectl -n backstage delete job backstage-writer-semantics-test
---
apiVersion: batch/v1
kind: Job
metadata:
  name: backstage-writer-semantics-test
  namespace: backstage
  labels:
    platform.capstone/component: smoke-test
spec:
  backoffLimit: 0          # one shot — a failure must surface, not retry-mask
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: backstage-vault-writer   # THE writer identity (not default, not root)
      volumes:
        - name: vault-token
          projected:
            sources:
              - serviceAccountToken:
                  path: vault-token
                  audience: vault          # MUST be vault — apiserver-audience token is rejected
                  expirationSeconds: 3600
        - name: vault-ca
          configMap:
            name: vault-ca                 # in-ns CA (create in backstage ns; see appset comment)
            items:
              - key: ca.crt
                path: ca.crt
      containers:
        - name: test
          image: curlimages/curl:8.11.1
          volumeMounts:
            - { name: vault-token, mountPath: /var/run/secrets/vault, readOnly: true }
            - { name: vault-ca, mountPath: /etc/backstage/vault-ca, readOnly: true }
          env:
            - { name: VAULT_ADDR, value: "https://vault.vault.svc.cluster.local:8200" }
            - { name: CACERT, value: "/etc/backstage/vault-ca/ca.crt" }
            - { name: ROLE, value: "backstage-writer" }
            - { name: P, value: "secret/data/tenants/smoketest/dev/app" }   # throwaway, in-scope
          command: ["/bin/sh", "-eu", "-c"]
          args:
            - |
              jwt=$(cat /var/run/secrets/vault/vault-token)
              c() { curl -sS --cacert "$CACERT" "$@"; }   # always trust the Vault CA
              echo "==> login as role=$ROLE (SA token, audience=vault)"
              tok=$(c --request POST --data "{\"jwt\":\"$jwt\",\"role\":\"$ROLE\"}" \
                    "$VAULT_ADDR/v1/auth/kubernetes/login" \
                    | sed -n 's/.*"client_token":"\([^"]*\)".*/\1/p')
              [ -n "$tok" ] || { echo "FAIL: no client_token (login rejected — check role/SA/audience)"; exit 1; }
              H="-H X-Vault-Token:$tok"
              # helper: PATCH merge-patch a single key (value may be a JSON literal incl. null)
              patch() { c $H -H 'Content-Type: application/merge-patch+json' \
                          --request PATCH --data "{\"data\":{\"$1\":$2}}" "$VAULT_ADDR/v1/$P" >/dev/null; }
              post()  { c $H --request POST --data "{\"data\":{\"$1\":$2}}" "$VAULT_ADDR/v1/$P" >/dev/null; }
              get()   { c $H "$VAULT_ADDR/v1/$P"; }
              echo "==> seed A+B (create — POST, since path is fresh)"
              post A '"a1"'
              patch B '"b1"' 2>/dev/null || post B '"b1"'   # set/rotate path: PATCH, create-fallback
              echo "==> patch C (merge-patch add a key)"
              patch C '"c1"'
              j=$(get)
              echo "$j" | grep -q '"A":"a1"' && echo "$j" | grep -q '"B":"b1"' && echo "$j" | grep -q '"C":"c1"' \
                || { echo "FAIL after add: expected A,B,C — got: $j"; exit 1; }
              echo "    OK: A,B,C all present"
              echo "==> delete B via merge-patch null (non-destructive single-key delete)"
              patch B null
              j=$(get)
              if echo "$j" | grep -q '"B":'; then echo "FAIL: B still present after null-delete — got: $j"; exit 1; fi
              echo "$j" | grep -q '"A":"a1"' && echo "$j" | grep -q '"C":"c1"' \
                || { echo "FAIL: A and/or C lost during B delete (DESTRUCTIVE!) — got: $j"; exit 1; }
              echo "    OK: A,C survive; B gone (non-destructive confirmed)"
              # NOTE: the throwaway path is left behind on purpose — the backstage-writer
              # policy has NO delete on metadata (least privilege; only read/list), so this
              # identity CANNOT purge the KV path. Root/human cleanup if desired:
              #   vault kv metadata delete secret/tenants/smoketest/dev/app
              echo "SEMANTICS-TEST: PASS"
