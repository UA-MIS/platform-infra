# Per-tenant SecretStore + RBAC TEMPLATE (ADR-030 B1, per-namespace isolation).
#
# This is a TEMPLATE (literal `__TEAM__` / `__ENV__` placeholders) — NOT a synced
# manifest (it is NOT in kustomization.yaml; the placeholders would fail RFC-1123).
# It is the per-tenant isolation contract: a namespaced `SecretStore` + a Vault
# k8s-auth role + policy that let a tenant's ServiceAccount read ONLY its own Vault
# path (`secret/data/tenants/__TEAM__/*`) — NOT the platform-wide ClusterSecretStore,
# NOT any other tenant's path. The follow-on tenant-contract PR + the M4 scaffolder
# render this per `<team>-<env>` namespace (same substitution model as
# platform-services/harbor-onboarding/).
#
# WHY a per-namespace SecretStore (not just the ClusterSecretStore): the
# ClusterSecretStore authenticates as the PLATFORM ESO SA (broad read). A per-ns
# SecretStore authenticates as the TENANT SA via a Vault role whose policy is scoped
# to that tenant's path — so even ESO's read on behalf of a tenant ExternalSecret is
# fenced to that tenant's subtree. Defense in depth + least privilege (D-048 spine).
#
# Three objects per tenant namespace:
#   1. ServiceAccount the tenant's ExternalSecrets authenticate as (or reuse the
#      app SA) — must be bound to a Vault k8s-auth role scoped to the tenant path.
#   2. SecretStore (namespaced) pointing at Vault via that SA.
#   (3. The Vault-side policy + role are created by vault-policies/tenant-role.sh
#       __TEAM__ __ENV__ — see that script.)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-tenant
  namespace: __TEAM__-__ENV__
  labels:
    platform.capstone/component: tenant
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-tenant
  namespace: __TEAM__-__ENV__
  labels:
    platform.capstone/component: tenant
spec:
  provider:
    vault:
      server: "https://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      # caProvider -> the in-ns `vault-ca` ConfigMap (key ca.crt). `make vault-onboard
      # NAME=__TEAM__ ENV=__ENV__` materializes it (a namespaced SecretStore can't
      # cross-ns reference the vault-server-tls Secret in ns vault). No manual CA paste.
      caProvider:
        type: ConfigMap
        name: vault-ca
        key: ca.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          # Per-tenant Vault role -> tenant policy scoped to secret/data/tenants/__TEAM__/*.
          role: "tenant-__TEAM__"
          serviceAccountRef:
            name: eso-tenant
            audiences:
              - vault
---
# Example tenant ExternalSecret (what the tenant repo / scaffolder commits — NAMES
# + remoteRefs ONLY, no values; this is the "nothing in git" win). The value lives
# in Vault at secret/data/tenants/__TEAM__/__ENV__/app under key DATABASE_URL.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: __TEAM__-__ENV__
  labels:
    platform.capstone/component: tenant
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-tenant
    kind: SecretStore          # the per-tenant store (NOT the ClusterSecretStore)
  target:
    name: app-secrets          # the k8s Secret the workload consumes
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: tenants/__TEAM__/__ENV__/app
        property: DATABASE_URL
