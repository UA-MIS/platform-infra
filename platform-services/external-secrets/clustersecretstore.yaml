# ClusterSecretStore — ESO -> Vault (ADR-030 B1). The cluster-wide default store
# pointing ESO at the in-cluster Vault over the Vault KUBERNETES auth method.
#
# ⚠ NOT in kustomization.yaml (NOT auto-synced): a ClusterSecretStore goes
# SecretSyncError until Vault is init+unsealed AND the `external-secrets` k8s auth
# role exists. The human applies this OUT-OF-BAND from the runbook (README.md §3)
# AFTER the Vault init runbook (vault/README.md §D). Once Vault is permanently live
# it MAY be promoted into a small GitOps app — it holds NO secret material (only the
# Vault address, mount path, role name, and the CA bundle), so it is git-safe.
#
# AUTH: ESO authenticates as its OWN ServiceAccount (external-secrets in the
# external-secrets ns). Vault's k8s auth role `external-secrets` (bound to that SA)
# grants the `external-secrets-ro` policy (read on secret/data/tenants/* + platform).
# This is the PLATFORM-WIDE store; per-tenant ISOLATION is enforced by per-namespace
# SecretStores (secretstore-template.yaml) that scope a tenant SA to ONLY its path.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  labels:
    platform.capstone/component: platform
spec:
  provider:
    vault:
      # In-cluster Vault, TLS on (https). The active service name.
      server: "https://vault.vault.svc.cluster.local:8200"
      # KV v2 engine mounted at `secret` (vault/README.md §D step 6). ESO appends
      # the v2 "/data" path automatically.
      path: "secret"
      version: "v2"
      # PEM CA that signed the Vault server cert (vault-server-tls, §C). Paste the
      # issuing CA here at apply time (it is a PUBLIC cert, git-safe) — OR use
      # caProvider to reference the CA from a ConfigMap/Secret instead of inlining:
      #   caProvider: { type: Secret, name: vault-server-tls, key: ca.crt, namespace: vault }
      caBundle: "<BASE64-OR-PEM-CA-BUNDLE-FROM-vault-server-tls>"
      auth:
        kubernetes:
          # The Vault k8s auth mount + the role bound to the ESO SA.
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets       # the ESO controller SA
            namespace: external-secrets
            # Vault 1.21+ requires the audience to match the auth role's
            # bound audience (vault/README.md / vault-policies/eso-role.sh).
            audiences:
              - vault
