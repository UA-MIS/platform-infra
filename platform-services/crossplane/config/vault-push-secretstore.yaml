# Writer SecretStore for the Harbor-robot → Vault bridge (ADR-031 §10 + track-4
# feat/eso-perteam-push §7). The Composition's per-tenant PushSecrets (rendered into
# crossplane-system, next to the RobotAccount connection secrets) reference THIS
# store to WRITE the robot creds into Vault at tenants/<team>/ci/harbor-push and
# tenants/<team>/<env>/harbor-pull (where track-4's app-overlay ExternalSecrets read
# them). It is the ONE writer plane (platform-owned), not per-tenant — so it lives
# here in config/ (synced once by platform-crossplane-runtime), not in the Composition.
#
# AUTH: ESO authenticates as the dedicated SA `eso-vault-push` (below) via the Vault
# k8s-auth role `crossplane-push`, whose policy grants WRITE on
# secret/data/tenants/* ONLY (create/update, no read of app secrets). That Vault
# role + policy is an OPERATOR step (Vault-admin keyboard) — committed for review +
# run as ../external-secrets/vault-policies/crossplane-push-role.sh. Until it exists
# the PushSecrets sit
# SecretSyncError (safe failure mode); they do not expose anything.
#
# ⚠ The writer policy is the counterpart to ESO's read policies
# (external-secrets/vault-policies/). Keep it scoped to tenants/* writes only.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-vault-push
  namespace: crossplane-system
  labels:
    platform.capstone/component: platform
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-push
  namespace: crossplane-system
  labels:
    platform.capstone/component: platform
spec:
  provider:
    vault:
      server: "https://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      # Public Vault CA (git-safe). The operator materializes the vault-ca ConfigMap
      # in crossplane-system (same `make vault-ca-manifest` mechanism track-4 uses
      # for tenant namespaces), or switch to an inline caBundle. NOT secret material.
      caProvider:
        type: ConfigMap
        name: vault-ca
        key: ca.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "crossplane-push"
          serviceAccountRef:
            name: eso-vault-push
            audiences:
              - vault
