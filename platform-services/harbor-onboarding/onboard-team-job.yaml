# Harbor per-team onboarding Job (P2.2, D-026) — TEMPLATE, parameterized by TEAM.
#
# Creates the team's Harbor PROJECT named `<name>` and maps its OIDC group
# `UA-MIS:<name>` -> Developer role, keyed on the SINGLE canonical `<name>` slug
# (D-026: AppProject = GitHub Team slug = OIDC group suffix = Vault path = Harbor
# project — one slug everywhere). Runs in the `harbor` namespace (where the
# harbor-admin Secret lives) so admin creds never leave the cluster.
#
# IDEMPOTENT: project-create and member-add are POSTs that 409 on duplicates, so
# the script treats "already exists" (HTTP 409) as success — re-running is safe.
#
# NOT auto-synced cluster-wide: this is APPLIED PER TEAM at onboarding via
# `make harbor-onboard NAME=<name>` (which substitutes __TEAM__ and applies it),
# mirroring the imperative-but-scripted onboarding seam. The robot-account ->
# sealed imagePullSecret step is a separate `make` step (the robot token is
# generated by Harbor and must be captured+sealed once — it cannot be declarative).
# See platform-services/harbor-onboarding/README.md.
#
# __TEAM__ is the substitution token (replaced by `make harbor-onboard`).
apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-onboard-__TEAM__
  namespace: harbor
  labels:
    platform.capstone/component: platform
    platform.capstone/team: __TEAM__
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        platform.capstone/component: platform
        platform.capstone/team: __TEAM__
    spec:
      restartPolicy: Never
      volumes:
        - name: tmp
          emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: onboard
          image: curlimages/curl:8.11.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: HARBOR_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: harbor-admin
                  key: HARBOR_ADMIN_PASSWORD
            - name: HARBOR_CORE
              value: "http://harbor-core.harbor.svc:80"
            - name: TEAM
              value: "__TEAM__"
          # The root fs is read-only (hardening, kept); curl writes its response
          # bodies to /tmp/p.out and /tmp/m.out (-o), so /tmp must be a writable
          # mount — without it curl fails: "(23) client returned ERROR on write".
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          command: ["/bin/sh", "-eu", "-c"]
          args:
            - |
              CORE="$HARBOR_CORE"; AUTH="admin:$HARBOR_ADMIN_PASSWORD"; T="$TEAM"

              echo "==> waiting for Harbor core at $CORE ..."
              i=0
              until curl -fsS -o /dev/null "$CORE/api/v2.0/systeminfo"; do
                i=$((i+1)); [ "$i" -ge 60 ] && { echo "core not ready"; exit 1; }
                sleep 5
              done

              # --- 1) create the private, auto-scan project named <name> ---------
              echo "==> creating Harbor project '$T' (private, auto_scan) ..."
              code=$(curl -sS -u "$AUTH" -o /tmp/p.out -w '%{http_code}' \
                -X POST "$CORE/api/v2.0/projects" -H 'Content-Type: application/json' \
                -d "{\"project_name\":\"$T\",\"metadata\":{\"public\":\"false\",\"auto_scan\":\"true\"}}")
              case "$code" in
                201) echo "   project created." ;;
                409) echo "   project '$T' already exists (idempotent OK)." ;;
                *)   echo "FAIL: create project HTTP $code"; cat /tmp/p.out; exit 1 ;;
              esac

              # --- 2) map the OIDC group UA-MIS:<name> -> Developer (role_id 2) ---
              # group_type 3 = OIDC group; role_id 2 = Developer (push/pull). Mirrors
              # the ArgoCD role:<name> scoping — same <name> everywhere (D-026/D-027).
              echo "==> mapping OIDC group 'UA-MIS:$T' -> Developer on project '$T' ..."
              code=$(curl -sS -u "$AUTH" -o /tmp/m.out -w '%{http_code}' \
                -X POST "$CORE/api/v2.0/projects/$T/members" -H 'Content-Type: application/json' \
                -d "{\"role_id\":2,\"member_group\":{\"group_name\":\"UA-MIS:$T\",\"group_type\":3}}")
              case "$code" in
                201) echo "   group mapping created." ;;
                409) echo "   group mapping already present (idempotent OK)." ;;
                *)   echo "FAIL: add member HTTP $code"; cat /tmp/m.out; exit 1 ;;
              esac

              echo "==> onboarding for team '$T' complete (project + OIDC Developer mapping)."
              echo "    NEXT (one-time, imperative — token is Harbor-generated):"
              echo "      make harbor-robot NAME=$T   # create pull robot -> sealed imagePullSecret"
