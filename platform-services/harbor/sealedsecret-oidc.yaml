# SealedSecret -> Secret `harbor-oidc` in the harbor namespace (P2.2).
# Holds the OIDC client secret Harbor uses for the `harbor` Dex static client.
# MUST equal dex-github's `harbor-client-secret` (both sealed from one generated
# value). Harbor's OIDC auth config references this. Sealed for the harbor ns.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: harbor-oidc
  namespace: harbor
spec:
  encryptedData:
    oidc-client-secret: 
  template:
    metadata:
      name: harbor-oidc
      namespace: harbor
    type: Opaque
