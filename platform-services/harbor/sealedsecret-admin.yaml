# SealedSecret -> Secret `harbor-admin` in the harbor namespace (P2.2).
# HARBOR_ADMIN_PASSWORD: the Harbor `admin` local account (break-glass; SSO is via
#   Dex). secretKey: Harbor's 16-char data-encryption key (REQUIRED; encrypts
#   stored robot tokens etc. — must stay stable across restarts). Both
#   platform-generated. The Helm values reference this Secret via existingSecret.
# Sealed for the harbor namespace (strict scope).
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: harbor-admin
  namespace: harbor
spec:
  encryptedData:
    HARBOR_ADMIN_PASSWORD: 
    secretKey: 
  template:
    metadata:
      name: harbor-admin
      namespace: harbor
    type: Opaque
