# ArgoCD OIDC wiring -> Dex (P2.1, §1.1, D-017). Adds two keys to argocd-cm: the
# external `url` (so ArgoCD builds correct OIDC redirect URLs) and `oidc.config`
# pointing at the standalone platform Dex broker.
#
# SELF-HEALING via GitOps (moved here from bootstrap/argocd-install in p2.1-fix):
# ArgoCD's application-controller applies with ServerSideApply using its OWN field
# manager, which merges these keys into the install-created argocd-cm at the FIELD
# level WITHOUT pruning the upstream `resource.customizations.*` / `resource.exclusions`
# keys (verified by live `kubectl diff --server-side --field-manager=...`). This is
# unlike a plain `kubectl apply`, whose default manager + last-applied annotation
# would prune unlisted keys — which is why this lived in the bootstrap patch before.
# Now it self-heals like every other platform-service.
#
# We use `oidc.config` (external OIDC provider) NOT the bundled `dex.config`,
# because §1.1 runs ONE shared platform Dex that Backstage/Grafana/Harbor also
# federate through.
#
# The clientSecret derefs the SealedSecret-materialised Secret `argocd-dex-client`
# (sealedsecret.yaml) as $argocd-dex-client:oidc.dex.clientSecret; it MUST equal
# the `argocd` staticClient secret Dex holds.
#
# UI THEMING (P2.1 THEME, University of Alabama MIS branding):
# The `ui.*` keys below are ADDITIVE and field-level-independent from the OIDC/RBAC
# keys above — they self-heal through the same application-controller SSA merge.
#   - ui.cssurl: a RELATIVE path "./custom/ua-mis.css" resolved against the server's
#     /shared/app static dir. The CSS is served FROM the argocd-server container via
#     a volume-mounted ConfigMap (argocd-ui-theme-cm, kustomization.yaml) mounted at
#     /shared/app/custom by the bootstrap install patch (bootstrap/argocd-install).
#     A LOCAL mount (not an external URL) keeps the theme self-contained + offline —
#     no CDN dependency on a sslip.io-only local cluster, and recreate-safe.
#   - ui.bannercontent: the UA-MIS identity banner. ui.bannerpermanent keeps it
#     visible (no per-user dismiss) so the branding is always present.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
    platform.capstone/component: platform
data:
  url: https://argocd.capstone.uamishub.com

  # ArgoCD-server fetches the issuer's discovery doc SERVER-SIDE over the in-cluster
  # path (id.capstone.uamishub.com -> rewritten by coredns-custom to Traefik -> Dex).
  # That hop presents the cert-manager wildcard cert, which is signed by the
  # self-signed PLATFORM CA (Phase-1, no ACME). ArgoCD won't trust that CA, so for
  # the Phase-1 LOCAL self-signed setup we skip OIDC TLS verification — exactly the
  # case the ArgoCD docs name as acceptable for a self-signed provider cert. This
  # parallels `server.insecure: true` (TLS terminates at Traefik). In-cluster
  # traffic only; the issuer cert is self-CA and rotates on cluster recreate, so
  # pinning a static rootCA PEM would break the reproducible-recreate invariant.
  # PHASE-3 REMOVAL: when the issuer moves to the Cloudflare zone with ACME-trusted
  # certs, DELETE this line (and the coredns-custom rewrite) — discovery becomes
  # publicly resolvable + publicly trusted. (Flagged to security: SEC review item.)
  oidc.tls.insecure.skip.verify: "true"

  oidc.config: |
    name: Dex (GitHub)
    issuer: https://id.capstone.uamishub.com
    clientID: argocd
    clientSecret: $argocd-dex-client:oidc.dex.clientSecret
    requestedScopes:
      - openid
      - profile
      - email
      - groups
    requestedIDTokenClaims:
      groups:
        essential: true

  # --- University of Alabama MIS UI theme (P2.1 THEME) ---
  # Local custom stylesheet served from the argocd-server container (see header).
  ui.cssurl: "./custom/ua-mis.css"
  # Identity banner shown on the login page + throughout the UI. Permanent (the UA-MIS
  # branding is not user-dismissible). PLAIN, NON-CLICKABLE text — ui.bannerurl is
  # deliberately OMITTED so the banner does not hyperlink anywhere (human direction:
  # the banner is identity text, not a link to the Culverhouse/MIS site).
  ui.bannercontent: "University of Alabama MIS — Internal Developer Platform"
  ui.bannerpermanent: "true"
  ui.bannerposition: "top"
