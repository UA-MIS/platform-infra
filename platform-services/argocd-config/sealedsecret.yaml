# SealedSecret -> Secret `argocd-dex-client` in the argocd namespace (P2.1, §1.1).
# Holds the Dex `argocd` staticClient secret that argocd-cm's oidc.config
# dereferences as $argocd-dex-client:oidc.dex.clientSecret. The materialised
# Secret carries label app.kubernetes.io/part-of: argocd (REQUIRED for ArgoCD to
# resolve a $<secret>:<key> ref outside argocd-secret). This value is
# platform-generated and MUST equal Dex's `argocd` staticClient secret (the
# `argocd-client-secret` key in the dex/ SealedSecret) — both sealed from the
# same generated value. Sealed for the argocd namespace (strict scope).
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: argocd-dex-client
  namespace: argocd
spec:
  encryptedData:
    oidc.dex.clientSecret: 
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: argocd
        platform.capstone/component: platform
      name: argocd-dex-client
      namespace: argocd
    type: Opaque
