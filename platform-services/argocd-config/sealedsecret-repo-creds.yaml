# ============================================================================
# ArgoCD org-wide PRIVATE-repo credential template (GitHub App) — DRAFT.
# ============================================================================
# WHY: ArgoCD currently has NO repository credentials registered, so it reads
# every git repo ANONYMOUSLY. That works for the PUBLIC repos (platform-infra,
# sample-app) but FAILS for any PRIVATE tenant app repo — the env/preview
# ApplicationSets' git-files generator errors with:
#     "error retrieving Git files: ... authentication required: Repository not found"
# (observed live on v1check-envs for the PRIVATE UA-MIS/v1check repo).
#
# The Backstage scaffolder creates tenant app repos PRIVATE by default. Rather
# than make each one public (a per-repo band-aid that leaks student source), this
# registers ONE org-scoped credential template so ArgoCD can read EVERY private
# repo under github.com/UA-MIS with a single secret.
#
# HOW IT WORKS (ArgoCD repo-creds, verified against current docs):
#   - label `argocd.argoproj.io/secret-type: repo-creds` makes this a CREDENTIAL
#     TEMPLATE (not a single repository). ArgoCD matches it to any repo whose URL
#     is PREFIXED by `url` below. `url: https://github.com/UA-MIS` therefore
#     covers all UA-MIS tenant repos with ONE secret — no per-repo entry.
#   - GitHub App auth (githubAppID / githubAppInstallationID / githubAppPrivateKey)
#     reuses the SAME `ua-mis-backstage` GitHub App already sealed for ARC
#     (platform-services/arc/sealedsecret-github-app.yaml: arc-github-app). No new
#     App, no PAT. App ID 4097147, Installation ID 141394298 (see the M2 GitHub-App
#     onboarding note). The App's installation MUST have Repository contents: Read
#     on the UA-MIS org (it already does for ARC checkout) — VERIFY before relying
#     on this (SEC: confirm read-only contents scope, no write).
#   - The materialised Secret carries label app.kubernetes.io/part-of: argocd so
#     ArgoCD's repo-server picks it up (same convention as the dex-client secret).
#
# ============================================================================
# ⚠⚠⚠ DRAFT — NOT FUNCTIONAL AS COMMITTED. encryptedData below is a PLACEHOLDER.
# ============================================================================
# The three encryptedData values are PLACEHOLDER strings, NOT real sealed data —
# they will NOT decrypt. This file is committed for REVIEW of the approach +
# wiring only. To make it live, the OPERATOR must seal the real GitHub App values
# (host-side, creds never touch git) and replace the placeholders. The values are
# identical to the ones already in arc-github-app, just re-sealed for the argocd
# namespace + repo-creds key names:
#
#   APP_ID=4097147
#   INSTALL_ID=141394298
#   # private key = the ua-mis-backstage App .pem the user holds locally
#
#   kubectl create secret generic argocd-repo-creds-uamis \
#     --namespace argocd \
#     --from-literal=type=git \
#     --from-literal=url=https://github.com/UA-MIS \
#     --from-literal=githubAppID="$APP_ID" \
#     --from-literal=githubAppInstallationID="$INSTALL_ID" \
#     --from-file=githubAppPrivateKey=/path/to/ua-mis-backstage.private-key.pem \
#     --dry-run=client -o yaml \
#   | kubeseal --controller-namespace kube-system \
#       --controller-name sealed-secrets-controller \
#       --namespace argocd --format yaml \
#   > /tmp/repo-creds-sealed.yaml
#
# Then copy the resulting spec.encryptedData (type/url/githubAppID/
# githubAppInstallationID/githubAppPrivateKey) over the placeholders below, keep
# the template block as-is, and commit. (type + url can also stay as sealed
# encryptedData — kept here as template stringData for readability/review; either
# works. If you prefer non-secret fields in the clear, move type+url to
# template.stringData and seal only the three githubApp* keys.)
#
# PROVISION CHECKLIST (operator, before this is live):
#   [ ] Confirm ua-mis-backstage App installation has Repository contents: READ on UA-MIS.
#   [ ] Seal the real values per the command above (kube-system controller).
#   [ ] Replace the 3 placeholder encryptedData values.
#   [ ] Apply via this app's normal GitOps sync (platform-svc-argocd-config).
#   [ ] Verify: v1check-envs ApplicationSet leaves ErrorOccurred, generates v1check-dev.
# ============================================================================
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: argocd-repo-creds-uamis
  namespace: argocd
spec:
  encryptedData:
    # PLACEHOLDER — re-seal real values (see header). Will NOT decrypt as-is.
    githubAppID: REPLACE_ME_sealed_githubAppID
    githubAppInstallationID: REPLACE_ME_sealed_githubAppInstallationID
    githubAppPrivateKey: REPLACE_ME_sealed_githubAppPrivateKey
  template:
    metadata:
      name: argocd-repo-creds-uamis
      namespace: argocd
      labels:
        # repo-creds (NOT repository) = a credential TEMPLATE matched by url-prefix
        # to every repo under github.com/UA-MIS.
        argocd.argoproj.io/secret-type: repo-creds
        # Required for ArgoCD's repo-server to consume the materialised Secret.
        app.kubernetes.io/part-of: argocd
        platform.capstone/component: platform
    type: Opaque
    # Non-secret selector fields in the clear (the url PREFIX drives matching).
    # If you'd rather seal these too, move them into encryptedData instead.
    stringData:
      type: git
      url: https://github.com/UA-MIS
