# ArgoCD RBAC -> GitHub Teams (P2.1, §1.1, D-017; SEC-006/007 fix). Binds the
# OIDC `groups` claim (GitHub Teams via Dex) to ArgoCD roles.
#
# CANONICAL TEAM IDENTIFIER = `<name>` (e.g. `sample`) — the Phase-1 convention
# (D-008): namespaces `<name>-<env>`, AppProject `metadata.name: <name>`, team apps
# `project: <name>`, GitHub Team slug `<name>`, OIDC group `UA-MIS:<name>`. ArgoCD
# app RBAC matches `<project>/<app>` = `<name>/<name>-*`. (SEC-006 was a mismatch:
# policy used `team-sample` while the AppProject is `sample` -> the role was inert.)
#
# Group format (SEC-007): Dex's GitHub connector with `orgs:` set emits ONLY
# `<org>:<team-slug>` groups (e.g. `UA-MIS:sample`). The BARE org `UA-MIS` is NOT
# emitted, so the org-wide read-only baseline is `policy.default`, not a group line.
#
# REAL UA-MIS team structure (confirmed via `gh api orgs/UA-MIS/teams` 2026-06-14):
#   - `labmx`                     = the MIS lab / platform-admin team -> role:admin.
#   - one PARENT team per semester (e.g. `capston-spring-2026` [sic, typo'd in GH],
#     `capstone-fall-2025`) — a grouping only, NO role (see semester note below).
#   - one CHILD team per PROJECT, nested under its semester parent. The child team
#     SLUG is the canonical `<name>` (= tenant/AppProject name, D-026) and gets the
#     scoped `role:<name>`.
#
# Group emission (verified): Dex's GitHub connector reads team membership via the
# GitHub `/user/teams` API, which returns EVERY team the user is in — parent AND
# child — as FLAT, separate entries. So Dex emits a distinct `UA-MIS:<slug>` group
# per membership (e.g. a user in project `walmart-s26` under `capston-spring-2026`
# gets BOTH `UA-MIS:capston-spring-2026` and `UA-MIS:walmart-s26`). The scoped
# binding therefore matches on the CHILD (project) slug; the parent slug is unused.
#
# Bindings:
#   - `UA-MIS:labmx` GitHub Team         -> role:admin (platform/lab admins)
#   - any authenticated UA-MIS member    -> role:readonly (policy.default baseline)
#   - `UA-MIS:<project-slug>` GitHub Team -> role:<project-slug> (scoped to AppProject)
#
# SEMESTER PARENT = grouping only, NO role (deliberate). Binding a semester-wide
# role would let any student in the cohort see/sync every SIBLING project's apps,
# breaking tenant isolation (§2.1, four-layer model). Cohort members already get
# the `policy.default: role:readonly` baseline; that is the only cross-cutting
# grant. (If a semester-wide read-only "dashboard" is ever wanted, add it as an
# explicit opt-in role then — flagged, not done now.)
#
# Break-glass: the local `admin` account (argocd-secret) is untouched (full access).
#
# Self-heals via the platform-services-appset (ServerSideApply, additive merge —
# the upstream argocd-rbac-cm ships empty so nothing is overwritten).
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
    platform.capstone/component: platform
data:
  # Org membership is enforced upstream by Dex (non-members never get a token), so
  # any authenticated UA-MIS member's baseline is read-only. This IS the org-wide
  # baseline (the bare-org group does not exist — see SEC-007 above).
  policy.default: role:readonly

  # csv format: https://argo-cd.readthedocs.io/en/stable/operator-manual/rbac/
  policy.csv: |
    # --- Platform/lab admins: the `labmx` GitHub Team -> built-in admin ---
    g, UA-MIS:labmx, role:admin

    # --- Per-PROJECT scoped role. Project = a nested GitHub team; its slug is the
    #     canonical `<name>` = AppProject name (D-026). Scoped to the team's OWN
    #     AppProject + apps (<name>/<name>-*) only. `sample` below is the EXAMPLE/
    #     template instance (binds when a `sample`-slug project team exists; inert +
    #     harmless otherwise). Instantiate one block + binding per onboarded project,
    #     using the project's child-team slug (e.g. walmart-s26, davita-s26). ---
    # Mirrors the team AppProject `developer` role's least-privilege stance
    # (tenants/team-sample/appproject.yaml): get + sync ONLY — explicitly NO
    # action/*, delete, or override (SEC consistency note on PR #3). logs/get and
    # projects/get are read-only adjuncts ArgoCD needs for the UI to function.
    p, role:sample, applications, get, sample/*, allow
    p, role:sample, applications, sync, sample/*, allow
    p, role:sample, logs, get, sample/*, allow
    p, role:sample, projects, get, sample, allow
    g, UA-MIS:sample, role:sample

  # Treat the `groups` scope as the source of role bindings.
  scopes: '[groups]'
