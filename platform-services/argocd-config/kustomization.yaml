# ArgoCD SSO config (P2.1, §1.1, D-017) — OIDC->Dex + RBAC + Ingress + the Dex
# static-client SealedSecret. Self-heals via the platform-services-appset.
#
# WHY THE ConfigMaps LIVE HERE NOW (p2.1-fix, were bootstrap/argocd-install before):
# ArgoCD's application-controller applies with ServerSideApply under its own field
# manager, which merges the keys in argocd-cm.yaml / argocd-rbac-cm.yaml into the
# install-created ConfigMaps at the FIELD level WITHOUT pruning the upstream keys
# (verified live: `kubectl diff --server-side --field-manager=argocd-application-controller`
# shows +url/+oidc.config only, zero removals). The original bootstrap-patch
# placement only applied at `make bootstrap` time and did NOT self-heal — so after
# the platform-service synced, ArgoCD still had no OIDC/RBAC config. Moving it here
# makes it GitOps-reconciled like every other service.
#
# ⚠ INVARIANT — THIS APP IS THE SOLE OWNER OF argocd-cm's ui.*/oidc.* DATA.
# argocd-cm is co-managed: the install (bootstrap/argocd-install/) owns ONLY the
# `resource.customizations.*` keys; THIS app (platform-svc-argocd-config, via the
# application-controller's ServerSideApply field manager) owns the `ui.*` (theme),
# `oidc.*` (SSO), and `url` keys. That split is what keeps both safe — SSA only
# touches each manager's own fields. DO NOT (re)introduce a CLIENT-SIDE
# `kubectl apply` of argocd-cm anywhere (bootstrap, a Makefile target, a runbook):
# a default-field-manager apply writes a `kubectl.kubernetes.io/last-applied-
# configuration` annotation, and the next `--server-side --force-conflicts` install
# apply then does a CSA->SSA migration that PRUNES the ui.*/oidc keys (absent from
# the install manifest) — which once wiped theme + SSO live (recovered by a
# force-sync of this app). `make bootstrap-reapply` is hardened to re-assert + assert
# these keys, but the durable rule is: argocd-cm reaches the cluster ONLY via this
# app's SSA. See bootstrap/argocd-install/kustomization.yaml for the mirror note.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - sealedsecret.yaml
  - argocd-cm.yaml
  - argocd-rbac-cm.yaml
  - ingress.yaml

# UA-MIS UI theme (P2.1 THEME): the custom stylesheet lives as a real .css file
# (ua-mis.css) and is packed into a ConfigMap here. argocd-server volume-mounts
# this CM at /shared/app/custom (bootstrap/argocd-install patch) and argocd-cm's
# `ui.cssurl: ./custom/ua-mis.css` points at it. A STABLE name (disableNameSuffixHash)
# is required because the volume reference in the install patch is a fixed string.
configMapGenerator:
  - name: argocd-ui-theme-cm
    namespace: argocd
    files:
      - ua-mis.css
generatorOptions:
  disableNameSuffixHash: true

labels:
  - pairs:
      platform.capstone/component: platform
    includeSelectors: false
