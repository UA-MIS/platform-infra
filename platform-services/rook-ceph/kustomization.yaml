# Rook-Ceph prereqs (P4, §3.4, D-035) — the namespace that must exist before the
# two Rook Helm Applications (applicationsets/rook-ceph-*-app.yaml) install.
# Managed by the platform-services-appset (directory generator over
# platform-services/*; this dir produces app `platform-svc-rook-ceph`). The Helm
# charts (operator + CephCluster) are SEPARATE Helm-source Applications and do NOT
# render through this kustomize dir.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml

labels:
  - pairs:
      platform.capstone/component: platform
    includeSelectors: false
