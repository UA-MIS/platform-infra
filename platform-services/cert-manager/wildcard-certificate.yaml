# Wildcard TLS Certificate for *.${PLATFORM_DOMAIN} (§5.1/§5.2).
#
# Signed by the platform CA issuer (clusterissuer.yaml). Stored as a TLS Secret
# in kube-system — the namespace where the BUNDLED Traefik runs (D-010) — so
# Traefik can serve it as the default cert for every <app>.<team>.<domain> host
# (the traefik/ service wires it as the default TLS store).
#
# PLATFORM_DOMAIN seam (§6): the dnsNames below are capstone.uamishub.com (D-036).
# ⚠ This is now the INTERNAL self-CA cert only. PUBLIC TLS is terminated at the
# Cloudflare edge (Universal SSL, D-036) — the Cloudflare Tunnel routes
# *.capstone.uamishub.com -> Traefik. This wildcard cert is what Traefik's default
# TLSStore serves on the cloudflared->Traefik / in-cluster legs; clients on the
# internet never see it. Both the wildcard and the apex are listed.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-platform-tls
  namespace: kube-system
  labels:
    platform.capstone/component: platform
  annotations:
    argocd.argoproj.io/sync-wave: "5"   # after the CA issuer (wave 4)
spec:
  secretName: wildcard-platform-tls       # the TLS Secret Traefik serves
  duration: 2160h                          # 90d, auto-renewed by cert-manager
  renewBefore: 360h                        # renew 15d before expiry
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
    # --- PLATFORM_DOMAIN seam (D-036): the internal Traefik TLSStore cert ---
    # Traefik serves this as the default TLSStore cert for ALL hosts regardless of SAN
    # label-depth (self-CA — only the in-cluster / tunnel-origin legs see it; the public
    # cert is Cloudflare's). The single-label wildcard covers the platform tools
    # (harbor./argocd./id.); two-level tenant-preview hosts (*.team.capstone...) reuse
    # this same cert internally — public two-level TLS is a CF Advanced-Cert / DNS-01
    # follow-up (D-036, deferred — not in the Phase-3 platform-tools path).
    - "*.capstone.uamishub.com"               # harbor./argocd./id./backstage. + <app>.<team>
    - "capstone.uamishub.com"                 # apex
  issuerRef:
    name: platform-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
