# Dex configuration (P2.1, §1.1, D-017) — the sole OIDC broker.
#
# Single connector: GitHub, org-gated to UA-MIS. Dex only issues a token to
# members of UA-MIS (native connector gating — no custom authenticator, §1.1) and
# surfaces the user's GitHub Teams as the OIDC `groups` claim. ArgoCD (and, later,
# Backstage/Grafana/Harbor) are registered as staticClients and federate here.
#
# Secrets are NOT in this ConfigMap. The GitHub OAuth app's clientID/clientSecret
# and ArgoCD's static-client secret are injected as ENV VARS from a SealedSecret
# (sealedsecret.yaml) and referenced below as $VARS — Dex expands environment
# variables in its config file at load. So this ConfigMap is safe to commit.
#
# PLATFORM_DOMAIN seam (§6): the issuer host `id.capstone.uamishub.com` is the
# Phase-1 dashed-sslip literal. Phase 3/4 re-points it at the Cloudflare zone —
# a one-line change here mirrored from clusters/<target>/values.env, plus the
# matching callback URL on the GitHub OAuth app.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dex
  namespace: dex
  labels:
    platform.capstone/component: platform
data:
  config.yaml: |
    # External issuer URL — must match what clients use and what TLS terminates
    # at (Traefik wildcard cert for *.capstone.uamishub.com). HTTPS-terminated at the
    # ingress; Dex itself listens HTTP on :5556 behind Traefik.
    issuer: https://id.capstone.uamishub.com

    storage:
      type: kubernetes
      config:
        inCluster: true

    web:
      http: 0.0.0.0:5556

    # Health/readiness endpoint (used by the Deployment probes).
    telemetry:
      http: 0.0.0.0:5558

    # GitHub-only. No static password DB (students never type a password into
    # the platform — identity is GitHub-org membership, §1.1).
    enablePasswordDB: false

    connectors:
      - type: github
        id: github
        name: GitHub
        config:
          clientID: $GITHUB_CLIENT_ID
          clientSecret: $GITHUB_CLIENT_SECRET
          # MUST exactly equal the GitHub OAuth app's Authorization callback URL.
          redirectURI: https://id.capstone.uamishub.com/callback
          # --- THE SECURITY BOUNDARY (§1.1): org-gated to UA-MIS only ---
          # Dex rejects any login from a non-member of UA-MIS at the connector
          # level (uses the read:org grant to check membership). To admit only
          # specific GitHub Teams later, add `teams:` under the org entry.
          orgs:
            - name: UA-MIS
          # Emit the user's GitHub Teams as groups with team SLUGs (stable,
          # lowercase, URL-safe). With `orgs:` set, the connector's groupsForOrgs
          # path emits ONLY `<org>:<team-slug>` entries (e.g. `UA-MIS:sample`) —
          # the BARE org `UA-MIS` is never emitted as a group (SEC-007). Org
          # membership is gated by `orgs:` regardless; the org-wide read-only
          # baseline comes from argocd-rbac-cm `policy.default`, not a group.
          # NOTE: `loadAllGroups` is intentionally omitted — it is a NO-OP when
          # `orgs:` is set (groupsForOrgs returns before honoring it, SEC-007).
          teamNameField: slug
          # Use GitHub login (handle) as the user ID — human-readable in ArgoCD
          # audit/UI instead of an opaque numeric ID.
          useLoginAsID: true

    # OAuth2 clients that federate through this broker. Each platform tool that
    # does human SSO is a static client here — the WHOLE POINT of the shared broker
    # (§1.1): one GitHub OAuth app, N tools. Secrets are injected from the
    # SealedSecret as $<NAME>_CLIENT_SECRET env vars.
    staticClients:
      - id: argocd
        name: ArgoCD
        secretEnv: ARGOCD_CLIENT_SECRET
        redirectURIs:
          # ArgoCD's OIDC callback (server URL + /auth/callback).
          - https://argocd.capstone.uamishub.com/auth/callback
          # ArgoCD CLI (argocd login --sso) loopback callback.
          - http://localhost:8085/auth/callback
      # Harbor (P2.2) — registry SSO via the SAME broker (NO new GitHub OAuth app).
      # Harbor-core fetches Dex discovery SERVER-SIDE; the issuer host
      # id.capstone.uamishub.com is already in-cluster-reachable via the coredns-custom
      # rewrite -> Traefik -> Dex (slice-1 pattern, reused, no new rewrite needed).
      - id: harbor
        name: Harbor
        secretEnv: HARBOR_CLIENT_SECRET
        redirectURIs:
          # Harbor's OIDC callback (server URL + /c/oidc/callback).
          - https://harbor.capstone.uamishub.com/c/oidc/callback
      # Backstage "Relay" (P5) — developer-portal SSO via the SAME broker (NO new
      # GitHub OAuth app). Backstage fetches Dex discovery SERVER-SIDE at
      # id.capstone.uamishub.com (in-cluster via the coredns-custom rewrite -> Traefik
      # -> Dex, slice-1 pattern, reused). Same self-signed-CA caveat as ArgoCD/Harbor.
      # ⚠ The RELAY_CLIENT_SECRET env (deployment.yaml) needs a `relay-client-secret`
      #   key added to the dex-github SealedSecret — RE-SEAL before go-live (README).
      - id: relay
        name: Relay
        secretEnv: RELAY_CLIENT_SECRET
        redirectURIs:
          # Backstage OIDC callback (baseUrl + /api/auth/oidc/handler/frame).
          - https://relay.capstone.uamishub.com/api/auth/oidc/handler/frame

    oauth2:
      # Skip the per-login "approve this app" screen — these are first-party
      # platform clients, not third-party. Smooth SSO UX.
      skipApprovalScreen: true
