# Dex configuration (P2.1, §1.1, D-017) — the sole OIDC broker.
#
# Single connector: GitHub, org-gated to UA-MIS. Dex only issues a token to
# members of UA-MIS (native connector gating — no custom authenticator, §1.1) and
# surfaces the user's GitHub Teams as the OIDC `groups` claim. ArgoCD (and, later,
# Backstage/Grafana/Harbor) are registered as staticClients and federate here.
#
# Secrets are NOT in this ConfigMap. The GitHub OAuth app's clientID/clientSecret
# and ArgoCD's static-client secret are injected as ENV VARS from a SealedSecret
# (sealedsecret.yaml) and referenced below as $VARS — Dex expands environment
# variables in its config file at load. So this ConfigMap is safe to commit.
#
# PLATFORM_DOMAIN seam (§6): the issuer host `id.127-0-0-1.sslip.io` is the
# Phase-1 dashed-sslip literal. Phase 3/4 re-points it at the Cloudflare zone —
# a one-line change here mirrored from clusters/<target>/values.env, plus the
# matching callback URL on the GitHub OAuth app.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dex
  namespace: dex
  labels:
    platform.capstone/component: platform
data:
  config.yaml: |
    # External issuer URL — must match what clients use and what TLS terminates
    # at (Traefik wildcard cert for *.127-0-0-1.sslip.io). HTTPS-terminated at the
    # ingress; Dex itself listens HTTP on :5556 behind Traefik.
    issuer: https://id.127-0-0-1.sslip.io

    storage:
      type: kubernetes
      config:
        inCluster: true

    web:
      http: 0.0.0.0:5556

    # Health/readiness endpoint (used by the Deployment probes).
    telemetry:
      http: 0.0.0.0:5558

    # GitHub-only. No static password DB (students never type a password into
    # the platform — identity is GitHub-org membership, §1.1).
    enablePasswordDB: false

    connectors:
      - type: github
        id: github
        name: GitHub
        config:
          clientID: $GITHUB_CLIENT_ID
          clientSecret: $GITHUB_CLIENT_SECRET
          # MUST exactly equal the GitHub OAuth app's Authorization callback URL.
          redirectURI: https://id.127-0-0-1.sslip.io/callback
          # --- THE SECURITY BOUNDARY (§1.1): org-gated to UA-MIS only ---
          # Dex rejects any login from a non-member of UA-MIS at the connector
          # level (uses the read:org grant to check membership). To admit only
          # specific GitHub Teams later, add `teams:` under the org entry.
          orgs:
            - name: UA-MIS
          # Emit ALL of the user's orgs+teams as groups, with team SLUGs (stable,
          # lowercase, URL-safe) — yields groups like `UA-MIS:team-<slug>` and the
          # bare org `UA-MIS`. ArgoCD RBAC (argocd-rbac-cm) binds to these.
          loadAllGroups: true
          teamNameField: slug
          # Use GitHub login (handle) as the user ID — human-readable in ArgoCD
          # audit/UI instead of an opaque numeric ID.
          useLoginAsID: true

    # OAuth2 clients that federate through this broker. ArgoCD is the first; its
    # static-client secret is injected from the SealedSecret as $ARGOCD_CLIENT_SECRET.
    staticClients:
      - id: argocd
        name: ArgoCD
        secretEnv: ARGOCD_CLIENT_SECRET
        redirectURIs:
          # ArgoCD's OIDC callback (server URL + /auth/callback).
          - https://argocd.127-0-0-1.sslip.io/auth/callback
          # ArgoCD CLI (argocd login --sso) loopback callback.
          - http://localhost:8085/auth/callback

    oauth2:
      # Skip the per-login "approve this app" screen — these are first-party
      # platform clients, not third-party. Smooth SSO UX.
      skipApprovalScreen: true
