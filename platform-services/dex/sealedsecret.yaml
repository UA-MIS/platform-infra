# SealedSecret -> Secret `dex-github` in the dex namespace (P2.1, §1.1).
# Keys:
#   client-id / client-secret : the UA-MIS GitHub OAuth app creds (REAL — the
#     human registered the OAuth app and supplied these; sealed here).
#   argocd-client-secret      : the Dex `argocd` staticClient secret (REAL).
#   harbor-client-secret      : the Dex `harbor` staticClient secret (P2.2; must equal
#     the harbor-oidc Secret's oidc-client-secret). (REAL,
#     platform-generated). MUST equal the argocd-config SealedSecret's
#     oidc.dex.clientSecret (both sealed from the SAME generated value).
# Sealed for the dex namespace (strict scope) — only decrypts there.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: dex-github
  namespace: dex
spec:
  encryptedData:
    argocd-client-secret: 
    client-id: 
    client-secret: 
    harbor-client-secret: 
  template:
    metadata:
      name: dex-github
      namespace: dex
    type: Opaque
