# SealedSecret -> Secret `dex-github` in the dex namespace (P2.1, §1.1).
# Keys:
#   client-id / client-secret : the UA-MIS GitHub OAuth app creds. CURRENTLY
#     PLACEHOLDERS — Dex starts but GitHub login fails until the human registers
#     the OAuth app and RE-SEALS with the real values (see dex/README.md).
#   argocd-client-secret      : the Dex `argocd` staticClient secret (REAL,
#     platform-generated). MUST equal the argocd-config SealedSecret's
#     oidc.dex.clientSecret. Preserve it across re-seals (README step 1).
# Sealed for the dex namespace (strict scope) — only decrypts there.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: dex-github
  namespace: dex
spec:
  encryptedData:
    argocd-client-secret: 
    client-id: 
    client-secret: 
  template:
    metadata:
      name: dex-github
      namespace: dex
    type: Opaque
