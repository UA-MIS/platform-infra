# Production app-config for "The Process" (UA-MIS capstone developer portal), baked into
# the custom image. This is the source of truth for the deployed portal; the Helm values
# in applicationsets/backstage-process-app.yaml are MERGED ON TOP at deploy (so the same
# ${VAR} names must match). Secrets arrive as env vars from the `backstage-process-secrets`
# SealedSecret (devops-owned): AUTH_OIDC_CLIENT_ID, AUTH_OIDC_CLIENT_SECRET, BACKEND_SECRET,
# POSTGRES_PASSWORD (+ GITHUB_TOKEN later, M2/M4). NO plaintext secrets live in git.
#
# Interim host: process.capstone.uamishub.com (repo-wide domain convention, matches Dex,
# Harbor, ArgoCD). The Dex `process` static client + redirect URI are wired in
# platform-services/dex/configmap.yaml.
app:
  baseUrl: https://process.capstone.uamishub.com

backend:
  baseUrl: https://process.capstone.uamishub.com
  listen:
    port: 7007
  # HTTP keep-alive tuning — defense-in-depth for the sign-in "Premature close" (the
  # in-process catalog-client reuses keep-alive sockets to localhost:7007). PRIMARY cure is
  # the Node 24.16 pin (Dockerfile; Node 24.17 CVE keep-alive regression, Backstage #34651);
  # this keeps server sockets alive longer than the client reuse window. headersTimeout >
  # keepAliveTimeout (Node requirement). Mirrored into the Helm appConfig (pod loads that).
  server:
    keepAliveTimeout: { seconds: 60 }
    headersTimeout: { seconds: 65 }
  # Backend service-to-service signing key (env from the SealedSecret).
  auth:
    keys:
      - secret: ${BACKEND_SECRET}
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: https://process.capstone.uamishub.com
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  # The bundled Bitnami postgresql subchart (postgresql.enabled=true). Host/user match the
  # chart defaults in the Application values; password is env-injected from the SealedSecret.
  database:
    client: pg
    connection:
      host: backstage-postgresql
      port: 5432
      user: bn_backstage
      password: ${POSTGRES_PASSWORD}

# ── SSO via the shared Dex broker (issuer id.capstone.uamishub.com) ──────────────────
# Same broker as ArgoCD/Harbor. The OIDC provider is wired in packages/backend
# (src/modules/authOidcProcess.ts) with a custom Dex-aware sign-in resolver
# (preferred_username -> User entity, with a catalog fallback for M1). NOTE: do NOT add a
# signIn.resolvers list here — a code-defined resolver only takes effect when app-config
# carries no resolvers (config resolvers win). Org gating (UA-MIS-only) is enforced
# UPSTREAM at Dex (SEC-007); Backstage trusts the broker.
auth:
  environment: production
  session:
    secret: ${BACKEND_SECRET}
  providers:
    oidc:
      production:
        metadataUrl: https://id.capstone.uamishub.com/.well-known/openid-configuration
        clientId: ${AUTH_OIDC_CLIENT_ID}
        clientSecret: ${AUTH_OIDC_CLIENT_SECRET}
        prompt: auto

# ── Permission framework (M2: THE SPINE) ───────────────────────────────────────────────
# Turn the permission framework ON so the custom CapstoneTeamPermissionPolicy
# (packages/backend/src/modules/permissionPolicy.ts) actually enforces. WITHOUT this the
# framework no-ops and serves every entity regardless of policy (plan R6). MUST also be
# mirrored into the Helm appConfig (the pod loads ONLY that — see the applicationset note).
permission:
  enabled: true

# ── Catalog ──────────────────────────────────────────────────────────────────────────
# M2: real GitHub-org ingestion (one Backstage Group per GitHub team, slug = <team>; one
# User per org member with spec.memberOf) replaces the M1 seed org.yaml. The ingested
# Users/Groups are what make the sign-in resolver + permission policy meaningful (a User
# carries its team memberships -> ownershipEntityRefs). The seed examples/org.yaml Location
# is REMOVED (it would re-inject the placeholder guest/guests and shadow real ingestion).
catalog:
  rules:
    - allow: [Component, System, API, Resource, Location, Template, Group, User]
  locations:
    - type: file
      target: ./examples/entities.yaml
    - type: file
      target: ./examples/template/template.yaml
      rules:
        - allow: [Template]
  # GitHub-org provider: ingests UA-MIS teams (-> Groups) and members (-> Users). Auth is
  # via integrations.github below (the GitHub App). Short initialDelay so the first
  # ingestion runs quickly after boot — R1: nobody can sign in until real Users exist.
  providers:
    githubOrg:
      id: production
      githubUrl: https://github.com
      orgs: ['UA-MIS']
      schedule:
        initialDelay: { seconds: 30 }
        frequency: { hours: 1 }
        timeout: { minutes: 10 }

# GitHub integration: authenticates as the UA-MIS GitHub App (ua-mis-backstage). M2 uses it
# for org ingestion (Organization: Members = Read); M4's Scaffolder reuses it for repo
# create + branch protection. App auth is preferred over a PAT (scoped, rotatable, not tied
# to a person). The non-secret IDs are inlined; the two SECRET values arrive as env vars
# from the backstage-process-secrets SealedSecret (devops seals them — see README/PR):
#   GITHUB_APP_PRIVATE_KEY   — the .pem contents (multi-line)
#   GITHUB_APP_CLIENT_SECRET — the App client secret
integrations:
  github:
    - host: github.com
      apps:
        - appId: 4097147
          clientId: Iv23liRQ6d2I2mibDMbY
          clientSecret: ${GITHUB_APP_CLIENT_SECRET}
          privateKey: ${GITHUB_APP_PRIVATE_KEY}
          # Installation 141394298 on the UA-MIS org. allowedInstallationOwners scopes the
          # App to that org so credential discovery never strays to another installation.
          allowedInstallationOwners: ['UA-MIS']

# ── M3: the secrets capability (capstone:seal-secret, ADR-029 §4) ───────────────────────
# Tells the capstone:seal-secret backend action where to find the OFFLINE sealing cert + the
# bundled kubeseal binary, and the repo-write conventions. The cert is the controller's
# PUBLIC key (D-047 A2): the action seals OFFLINE (`kubeseal --cert <path>`), so there is NO
# backstage->controller egress. The cert is mounted by the Helm extraVolume/extraVolumeMount
# in applicationsets/backstage-process-app.yaml (devops, m2-deploy) at sealingCertPath; the
# kubeseal binary is baked into the image (packages/backend/Dockerfile, pinned v0.37.0). These
# values must be mirrored into the Helm appConfig IF the pod loads only that (same pattern as
# permission.enabled) — confirm with devops.
capstone:
  secrets:
    # The mounted public sealing cert (read-only ConfigMap, m2-deploy). Action seals offline.
    sealingCertPath: /etc/backstage/sealing-cert/sealing-cert.pem
    # The bundled kubeseal binary (Dockerfile COPY); 'kubeseal' on PATH also works.
    kubesealBin: /usr/local/bin/kubeseal
    # PR branch name prefix for each seal (branch = <prefix><key>-<env>-<timestamp>).
    defaultBranchPrefix: secrets/
    # Where the SealedSecret lands in the team app repo (per-key file).
    secretsDir: .devops/secrets
    # Relative path FROM an env overlay's kustomization.yaml TO the secrets dir (Option A,
    # coordinated with M4): .devops/chart/overlays/<env>/ -> .devops/secrets/.
    overlayRelPath: ../../secrets
    # Parent dir holding the per-env overlay kustomizations the action appends the SealedSecret
    # reference to (dev/staging/prod; preview/pr-<n> are ephemeral and out of scope).
    overlaysDir: .devops/chart/overlays
