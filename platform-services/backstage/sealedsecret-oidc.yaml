# SealedSecret -> Secret `backstage-process-secrets` in the backstage namespace (P5).
#
# Backstage's custom app image reads these as ENV VARS (the chart injects them via
# `backstage.extraEnvVarsSecrets: [backstage-process-secrets]`); the app-config.yaml
# baked into the image references them as ${VAR} (see the values block in
# applicationsets/backstage-process-app.yaml and platform-services/backstage/README.md):
#
#   AUTH_OIDC_CLIENT_ID     : the Dex `process` staticClient id (literally "process").
#   AUTH_OIDC_CLIENT_SECRET : the Dex `process` staticClient secret. MUST equal the
#                             `process-client-secret` added to the dex-github SealedSecret
#                             (platform-services/dex/sealedsecret.yaml) — both sealed
#                             from the SAME generated value, exactly like Harbor's
#                             harbor-oidc <-> dex-github harbor-client-secret pairing.
#   BACKEND_SECRET          : Backstage backend auth signing key (`backend.auth.keys`).
#                             Any high-entropy value (e.g. `openssl rand -base64 32`).
#   POSTGRES_PASSWORD       : password for the bundled Postgres `bn_backstage` user;
#                             MUST equal the value the postgresql subchart is told to
#                             use (postgresql.auth.existingSecret -> see below).
#
# ⚠ PLACEHOLDER — NOT A REAL SEALED SECRET. The values below are inert base64 of the
# literal string "PLACEHOLDER" and will NOT decrypt against the live sealed-secrets
# controller. They exist so the manifest renders + reviews now (ahead-of-need prep;
# the cluster is mid-heal). BEFORE go-live, RE-SEAL with real values per the
# "To go live" checklist in platform-services/backstage/README.md, e.g.:
#
#   kubectl create secret generic backstage-process-secrets -n backstage \
#     --from-literal=AUTH_OIDC_CLIENT_ID=process \
#     --from-literal=AUTH_OIDC_CLIENT_SECRET="$PROCESS_CLIENT_SECRET" \
#     --from-literal=BACKEND_SECRET="$(openssl rand -base64 32)" \
#     --from-literal=POSTGRES_PASSWORD="$PG_PASSWORD" \
#     --dry-run=client -o yaml \
#   | kubeseal --controller-namespace kube-system \
#       --controller-name sealed-secrets-controller \
#       --format yaml --namespace backstage > platform-services/backstage/sealedsecret-oidc.yaml
#
# Sealed for the backstage namespace (strict scope) — only decrypts there.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: backstage-process-secrets
  namespace: backstage
  labels:
    platform.capstone/component: platform
  annotations:
    # PLACEHOLDER marker so a sync/audit can grep for un-resealed secrets pre-go-live.
    platform.capstone/placeholder: "true"
spec:
  encryptedData:
    # base64("PLACEHOLDER") — inert; re-seal before go-live (see header).
    AUTH_OIDC_CLIENT_ID: UExBQ0VIT0xERVI=
    AUTH_OIDC_CLIENT_SECRET: UExBQ0VIT0xERVI=
    BACKEND_SECRET: UExBQ0VIT0xERVI=
    POSTGRES_PASSWORD: UExBQ0VIT0xERVI=
  template:
    metadata:
      name: backstage-process-secrets
      namespace: backstage
      labels:
        platform.capstone/component: platform
    type: Opaque
