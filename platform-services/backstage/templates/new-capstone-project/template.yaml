# "New Capstone Project" — The Process Scaffolder GOLDEN-PATH template (P5, §1.2).
#
# This is the headline IDP feature: a student fills four fields, and The Process creates a
# new team app repo under UA-MIS pre-wired to the platform's `.devops/` contract
# (the same one team-sample-app proves end-to-end: PR -> preview, merge -> dev,
# tag -> staging, manual gate -> prod). The student then only ever edits `app/` and
# the four fields in `.devops/app-metadata.yaml` — everything else is platform-managed.
#
# WHAT IT DOES (steps below):
#   1. fetch:template — render the ENTIRE ./skeleton (app/ starter + .devops/ golden-path
#      contract [chart base+overlays, promotion.yaml, ci/ scripts] + .github/ CI workflow +
#      catalog-info.yaml + mkdocs/TechDocs) with the collected values. SELF-CONTAINED: the
#      contract is EMBEDDED in the skeleton — there is NO fetch:plain from an external repo,
#      NO sample-app dependency, NO contract tag. appName/team are substituted INTO the
#      contract so a fresh scaffold is correct for its own team/app on the first build. The
#      one GitHub-Actions file (.github/workflows/build-and-push.yaml) is listed under
#      copyWithoutTemplating so nunjucks never mangles its ${{ github.* }} expressions.
#   3. publish:github — create UA-MIS/<repo>, push, set the default branch + the
#      branch protection the platform expects (PRs only into main; no direct pushes).
#   4. catalog:register — register the new component's catalog-info.yaml so it shows
#      up in The Process software catalog immediately.
#   5a. capstone:render-tenant — render tenants/team-<name>/ from the canonical
#      tenants/_template/ blueprint (D-M4-2: render the single source, no fork;
#      substitutes the literal __TEAM__/__SEMESTER__ tokens the built-in nunjucks
#      fetch:template cannot).
#   5b. publish:github:pull-request — open a REVIEW-GATED PR to UA-MIS/platform-infra
#      adding those tenant manifests, with an operator onboarding CHECKLIST PR body
#      (the TARGET=real-talos Harbor commands, lesson #1). A reviewer merges to GRANT
#      (D-049): a student opens the request, the merge is the gate — no student mints
#      cluster RBAC/quota/Harbor robots directly.
#
# ⚠ REQUIRES (wired at go-live — see platform-services/backstage/README.md):
#   - The GitHub integration token (${GITHUB_TOKEN}, the UA-MIS GitHub App) with repo
#     + admin:org. Used by publish:github (repo create) AND publish:github:pull-request
#     (the platform-infra onboarding PR — so ANY member can open it; merge is the gate).
#   - The capstone:render-tenant custom scaffolder action registered in the backend
#     (plugins/scaffolder-backend-module-capstone, shared with capstone:seal-secret).
#   - (No external .devops/ source repo — the contract is embedded in ./skeleton.)
#   - The OIDC sign-in so the acting user (a UA-MIS member) is the repo author.
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: new-capstone-project
  title: New Capstone Project
  description: >-
    Create a new UA-MIS capstone team app repo, pre-wired to the platform golden
    path (PR -> preview, merge -> dev, tag -> staging, manual gate -> prod). You edit
    only `app/` and the four fields in `.devops/app-metadata.yaml`.
  tags:
    - capstone
    - golden-path
    - recommended
spec:
  owner: group:default/platform
  type: service

  parameters:
    - title: Your project
      required:
        - appName
        - team
        - semester
      properties:
        appName:
          title: App name
          type: string
          description: >-
            Short slug for your app + repo (lowercase letters, digits, hyphens — no
            spaces, uppercase, or dots). Becomes the repo name, the Kubernetes
            workload names, and the ingress host <app-name>.<team>.<platform-domain>,
            so it MUST be a DNS-1123 label.
          # DNS-1123 label: lowercase alphanumerics + hyphens, must start AND end with
          # an alphanumeric (so a hyphen can't be first/last). Same charset as a repo
          # name, a k8s object name, and a DNS hostname segment — all three derive from
          # this one value, so enforce the strictest (DNS) form here.
          pattern: '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'
          maxLength: 30
          ui:autofocus: true
          ui:help: 'Lowercase letters, digits, and hyphens only; must start and end with a letter or digit (e.g. my-capstone-app).'
        team:
          title: Team slug
          type: string
          description: >-
            Your team's canonical slug — MUST equal your GitHub Team slug and your
            AppProject name (the platform keys per-team namespaces, RBAC, Harbor
            project, and OIDC group on this single value, D-026).
          pattern: '^[a-z]([-a-z0-9]*[a-z0-9])?$'
          maxLength: 30
        semester:
          title: Semester
          type: string
          description: Cohort selector label, e.g. 2026-fall.
          pattern: '^[0-9]{4}-(spring|summer|fall)$'
          default: '2026-fall'
        port:
          title: Container port
          type: integer
          description: The port your app listens on (PORT env + Service/Ingress target).
          default: 8080
          minimum: 1
          maximum: 65535
        description:
          title: Description
          type: string
          description: One-line description of your project (shown in the catalog).
          default: A UA-MIS capstone project.

    # NOTE: there is intentionally NO separate "Repository" page / repoUrl input.
    # The repo is created at github.com/UA-MIS/<appName> — owner is fixed to UA-MIS and
    # the repo name IS the app name (enter once on the page above; no double-entry). The
    # repoUrl is constructed inline at the publish steps below as
    # `github.com?owner=UA-MIS&repo=${{ parameters.appName }}`. We dropped the
    # RepoUrlPicker entirely (rather than just defaulting it) because it added a redundant
    # field AND, with `requestUserCredentials`, would start a USER GitHub OAuth flow
    # (/api/auth/github/start) — but The Process has NO `github` auth provider (D-017:
    # Dex/OIDC sign-in + the GitHub App for all API calls). Repo creation runs as the
    # platform GitHub App via integrations.github (see publish:github — no token input).

  steps:
    # 1) Render the per-team starter (app/ + the 4-field app-metadata.yaml + catalog).
    - id: fetch-skeleton
      name: Render project skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          appName: ${{ parameters.appName }}
          team: ${{ parameters.team }}
          semester: ${{ parameters.semester }}
          port: ${{ parameters.port }}
          description: ${{ parameters.description }}
          destination: ${{ ("github.com?owner=UA-MIS&repo=" + parameters.appName) | parseRepoUrl }}
      # SELF-CONTAINED CONTRACT: the golden-path `.devops/` tree (chart base + 4
      # overlays, promotion.yaml, ci/ scripts) AND the `.github/` CI workflow are
      # EMBEDDED in ./skeleton — NO `fetch:plain` from an external repo. The scaffolder
      # itself is the blueprint: deleting/renaming UA-MIS/sample-app has zero effect, no
      # contract tag to maintain, no GitHub-App access to sample-app needed. The
      # appName/team values above are substituted INTO the contract (registry, namespace,
      # ingress host, image name, labels) so a fresh scaffold is correct for ITS OWN
      # team/app on the first build — fixing the old fetch:plain bug where every tenant
      # inherited sample's hardcoded `sample-dev`/`harbor.../sample/sample` values.
      # Protect the GitHub-Actions workflow (`${{ github.* }}`/`${{ secrets.* }}` — the
      # SAME `${{ }}` nunjucks uses) AND the .devops/ci/ shell scripts from nunjucks.
      # The workflow is the only file that strictly NEEDS it (it's the only `${{` file,
      # and it self-derives registry+app from promotion.yaml at runtime — no per-team
      # templating); the scripts use `${VAR}` (single brace, nunjucks-safe) but are
      # belt-and-suspenders protected so the whole CI surface is shipped VERBATIM and a
      # future `${{`-using edit can't silently break. Broad globs cover both subtrees.
      # NOTE (Backstage 1.52): the current key is `copyWithoutTemplating`;
      # `copyWithoutRender` (the older name) was deprecated in 1.40 — if the deployed
      # action rejects this key, rename to `copyWithoutRender` (same semantics).
      copyWithoutTemplating:
        - '**/.github/**'
        - '**/.devops/ci/**'

    # 3) Create UA-MIS/<repo>, push, protect main (PRs only — matches platform policy).
    - id: publish
      name: Publish to GitHub (UA-MIS)
      action: publish:github
      input:
        # Repo = github.com/UA-MIS/<appName> (owner fixed, name = app name; no repoUrl input).
        repoUrl: github.com?owner=UA-MIS&repo=${{ parameters.appName }}
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: private
        # Platform branch policy: PRs into main, no direct pushes (mirrors the live
        # branch-protection the golden path assumes; reviewers/CI gate merges).
        protectDefaultBranch: true
        requireCodeOwnerReviews: true
        # Grant repo access by GitHub TEAM (not by creator/individual) so permissions are
        # role-based and don't depend on who clicked "create":
        #   - the project team gets PUSH (read/write — develop + open PRs, NOT admin).
        #   - labmx (platform staff) gets ADMIN (settings/protection/transfer).
        # So a normal member never gets admin merely for being the creator. NOTE: each
        # team must already exist on the UA-MIS org for the grant to apply; if the team
        # slug is wrong/missing GitHub skips that collaborator (publish:github does not
        # hard-fail the scaffold on an unknown team — graceful, per design).
        collaborators:
          - team: ${{ parameters.team }}
            access: push
          - team: labmx
            access: admin
        # No `token:` — publish:github authenticates via the configured integrations.github
        # (the platform GitHub App, sealed in backstage-process-secrets), the same App used
        # by catalog ingestion + capstone:render-tenant. Repo creation runs as the App, not
        # a user OAuth token (which we removed from the RepoUrlPicker above). Mirrors the
        # publish:github:pull-request step (5b), which already uses the App token.

    # 4) Register the new component so it appears in The Process catalog right away.
    - id: register
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

    # =====================================================================
    # PLATFORM SIDE — the D-049 review-gated grant path (B1 + B2).
    # The steps above created the STUDENT's own repo (automatic — they own it).
    # The steps below open a *request* (a PR to platform-infra) that a reviewer
    # *grants* (merge) — a student must NEVER silently mint cluster RBAC, quotas,
    # namespaces, or Harbor robots. The merge is the gate.
    # =====================================================================

    # 5a) Render the tenant manifests from the SINGLE canonical blueprint
    #     tenants/_template/ (D-M4-2: render, do NOT fork — there is one source
    #     of truth for the tenant fence, no divergent copy to drift). The
    #     _template/ files carry literal __TEAM__/__SEMESTER__ tokens (the make/sed
    #     convention), NOT nunjucks ${{ }}, so the built-in fetch:template can't
    #     render them — hence the custom capstone:render-tenant action, which
    #     fetches _template/ at a pinned ref and substitutes the tokens.
    - id: render-tenant
      name: Render tenant manifests (tenants/team-<name>/)
      action: capstone:render-tenant
      input:
        # Pinned platform-infra ref for the _template/ blueprint (reproducible;
        # bump deliberately like the .devops contract pin above).
        templateUrl: https://github.com/UA-MIS/platform-infra/tree/main/tenants/_template
        team: ${{ parameters.team }}
        semester: ${{ parameters.semester }}
        # Write the rendered tree under this workspace subdir; the PR step picks
        # it up as the PR's sourcePath. The action lays it out at the final repo
        # path tenants/team-<team>/ so the PR diff is review-ready.
        targetPath: ./tenant-pr

    # 5b) Open the PR to platform-infra adding tenants/team-<name>/. Uses the
    #     PLATFORM GitHub App token (the integrations.github `${GITHUB_TOKEN}`),
    #     NOT the student's USER_OAUTH_TOKEN — so ANY signed-in UA-MIS member can
    #     OPEN the request even without platform-infra collaborator rights. The
    #     branch-protection on platform-infra/main is the gate: they can open, only
    #     a reviewer (CODEOWNERS on tenants/**) can MERGE. (ADR-029 §9 #1; D-049.)
    - id: tenant-pr
      name: Open platform onboarding PR (platform-infra)
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=UA-MIS&repo=platform-infra
        branchName: onboard-team-${{ parameters.team }}
        targetBranchName: main
        title: "onboard tenant: team-${{ parameters.team }} (${{ parameters.semester }})"
        sourcePath: ./tenant-pr
        # B2 — the operator onboarding CHECKLIST is the PR body. Every Harbor
        # command shows TARGET=real-talos explicitly (lesson #1: omitting TARGET
        # bakes the k3d-default registry host into the sealed robot -> docker auth
        # host-mismatch -> push/pull 403; it cost a failed M1 push 2026-06-19). The
        # non-empty-seal guard (lesson #6) is baked into each seal command so a
        # duplicate-robot 409 can never commit an empty SealedSecret.
        description: |
          ## Tenant onboarding request — `team-${{ parameters.team }}` (`${{ parameters.semester }}`)

          Scaffolded by **The Process** ("New Capstone Project") for app
          **${{ parameters.appName }}** (repo: ${{ steps['publish'].output.remoteUrl }}).

          This PR adds `tenants/team-${{ parameters.team }}/` (rendered from the
          canonical `tenants/_template/` blueprint — namespaces, AppProject, RBAC,
          quotas, env + preview ApplicationSets). **Merging is the grant**: on merge
          the `tenants-appset` git generator reconciles the team's namespaces and
          ApplicationSets. No cluster RBAC/quota is created until a reviewer merges.

          ---

          ### Reviewer checklist
          - [ ] Manifests render cleanly (`make validate` on `tenants/team-${{ parameters.team }}/`).
          - [ ] AppProject is team-scoped (empty `clusterResourceWhitelist`; destinations limited to `team-${{ parameters.team }}-*`).
          - [ ] `__TEAM__`/`__SEMESTER__` fully substituted (no leftover tokens).

          ### Operator steps (run AFTER merge — imperative Harbor provisioning)
          Harbor robot tokens are Harbor-generated, one-time, and **cannot** be
          expressed declaratively, so these are run by an operator post-merge.
          **Run them with `TARGET=real-talos` exactly as shown** (omitting `TARGET`
          seals the wrong registry host → push/pull 403). All seals use the
          non-empty guard so a duplicate-robot 409 never commits an empty secret.

          ```bash
          # 0) cluster context (Talos)
          export KUBECONFIG=clusters/real-talos/talos-kubeconfig

          # 1) Harbor project + OIDC group -> Developer mapping
          make harbor-onboard NAME=${{ parameters.team }} \
            TARGET=real-talos KUBE_CONTEXT=admin@capstone

          # 2) CI PUSH robot -> sealed `harbor-push` into arc-runners (guarded write)
          make harbor-push-robot NAME=${{ parameters.team }} \
            TARGET=real-talos KUBE_CONTEXT=admin@capstone \
            > /tmp/${{ parameters.team }}-push.yaml \
            && test -s /tmp/${{ parameters.team }}-push.yaml \
            && grep -q 'kind: SealedSecret' /tmp/${{ parameters.team }}-push.yaml \
            && mv /tmp/${{ parameters.team }}-push.yaml \
                  tenants/team-${{ parameters.team }}/harbor-push-sealed.yaml

          # 3) per-env PULL robots -> sealed `harbor-pull` into <team>-<env> (guarded)
          for ENV in dev staging prod; do
            make harbor-robot NAME=${{ parameters.team }} ENV=$ENV \
              TARGET=real-talos KUBE_CONTEXT=admin@capstone \
              > /tmp/${{ parameters.team }}-pull-$ENV.yaml \
              && test -s /tmp/${{ parameters.team }}-pull-$ENV.yaml \
              && grep -q 'kind: SealedSecret' /tmp/${{ parameters.team }}-pull-$ENV.yaml \
              && mv /tmp/${{ parameters.team }}-pull-$ENV.yaml \
                    tenants/team-${{ parameters.team }}/harbor-pull-$ENV-sealed.yaml
          done

          # 4) commit the sealed robot secrets (a follow-up PR; tokens are one-time)
          git add tenants/team-${{ parameters.team }}/harbor-*-sealed.yaml \
            && git commit -m "harbor robots: team-${{ parameters.team }}"
          ```

          > Robot-mint automation (a merge-triggered devops action) is a planned
          > fast-follow (D-M4-1); for now these run by an operator who holds the
          > Harbor-admin/seal-controller trust (kept off the Backstage backend).
        token: ${{ secrets.GITHUB_TOKEN }}

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
      - title: Platform onboarding PR (awaiting reviewer merge)
        icon: github
        url: ${{ steps['tenant-pr'].output.remoteUrl }}
    text:
      - title: Next steps
        content: |
          Your repo **${{ parameters.appName }}** is live under UA-MIS. Now:
          1. Clone it and edit `app/` (your code) — leave `.devops/` alone.
          2. Open a PR -> a **preview** environment is built automatically.
          3. Merge to `main` -> **dev** auto-deploys.
          4. Tag `vX.Y.Z` -> **staging** auto-deploys; **prod** waits on the manual gate.
          Your app will be at `https://${{ parameters.appName }}.${{ parameters.team }}.<platform-domain>`.

          **One thing is gated:** a **platform onboarding PR** was opened against
          `UA-MIS/platform-infra` to stand up your team's namespaces/RBAC/Harbor
          (link above). A platform reviewer must **merge** it before your app can
          deploy — your repo builds previews immediately, but dev/staging/prod wait
          on that merge + the operator's Harbor steps (listed in the PR).
