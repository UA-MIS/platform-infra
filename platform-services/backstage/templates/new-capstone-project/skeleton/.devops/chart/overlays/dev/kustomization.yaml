# dev overlay — tracks main, auto-synced by the env ApplicationSet (§2.3).
# Image seam: dev follows the latest main build (promotion.yaml: dev=main digest).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ${{ values.team }}-dev
resources:
  - ../../base
  # Per-tenant ESO store + SA (vault-tenant / eso-tenant, scoped to this team's
  # Vault path) — the tenant half of the ADR-030 B1 secrets contract.
  - secretstore.yaml
  # ${{ values.appName }}-secret ExternalSecret (demonstrates the secret path; APP_SECRET in
  # base is optional + deletionPolicy Delete so a fresh repo with no Vault value still
  # deploys — M4 zero-config).
  - app-secret.externalsecret.yaml
  # harbor-pull image-pull cred (SA imagePullSecrets:[harbor-pull], #C3) — ON HOLD for v1.
  # v1 delivers harbor-pull OUT-OF-BAND: the pull robot is Harbor-minted at onboarding
  # (`make harbor-robot`) and applied as a SealedSecret into <team>-<env>, so the cred is
  # NOT wired here (two owners of Secret `harbor-pull` would collide). harbor-pull.external
  # secret.yaml is MODELED + the Vault path `tenants/<team>/<env>/harbor-pull` is RESERVED
  # for a clean later flip — uncomment the line below once robot creds move to Vault
  # (user-scope "nothing-in-git for robot creds?" call; ADR-030 follow-on, coordinated w/
  # eso-vault). Until then it stays commented so v1 uses the working SealedSecret path.
  # - harbor-pull.externalsecret.yaml
  # capstone:secrets — The Process "Secrets" tab (M3 ESO rework, ADR-030 §5) adds user
  # secret keys by APPENDING a `data[]` entry to app-secret.externalsecret.yaml above
  # (one ExternalSecret / one k8s Secret `${{ values.appName }}-secret` per env; all keys
  # share the Vault object `tenants/${{ values.team }}/<env>/app`) — it does NOT add files
  # here. Manifests must stay INSIDE this overlay dir: a kustomize resource that escapes
  # the chart/ root (e.g. ../../../secrets/...) fails ArgoCD's default load restrictor.
# env-specific selector label (§3.1). semester comes from app-metadata via the
# tenant; set here for the workload's own label contract.
labels:
  - pairs:
      platform.capstone/env: dev
      platform.capstone/semester: 2026-fall
    includeSelectors: false
# Image-tag SEAM (§4.1): the CI image-bump (T8) rewrites newTag here.
images:
  - name: ${{ values.appName }}
    newName: harbor.capstone.uamishub.com/${{ values.team }}/${{ values.appName }}
    newTag: 329c707
replicas:
  - name: ${{ values.appName }}
    count: 1
patches:
  - target:
      kind: Ingress
      name: ${{ values.appName }}
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: ${{ values.appName }}.dev.capstone.uamishub.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: ${{ values.appName }}.dev.capstone.uamishub.com
