# harbor-pull — RESERVED ESO model (NOT wired in v1). ADR-030 B1 follow-on.
#
# ⚠ This file is MODELED but COMMENTED OUT of the overlay kustomization. In v1 the
# `harbor-pull` kubernetes.io/dockerconfigjson Secret is delivered OUT-OF-BAND: the
# platform mints a Harbor pull robot at onboarding (`make harbor-robot`) and applies it
# as a SealedSecret into <team>-<env>. Wiring this ExternalSecret too would create two
# owners of Secret `harbor-pull` (collision). It ships here so the migration to
# robot-creds-in-Vault is a one-line flip (uncomment the resource line in
# kustomization.yaml + have onboarding `vault kv put` the creds) once the user makes the
# "nothing-in-git for robot creds?" call (coordinated with eso-vault; path RESERVED).
#
# When activated: deletionPolicy default (Retain) — image pull can't work without this,
# so a missing Vault value SURFACES as SecretSyncError. The reserved Vault path is
# secret/data/tenants/${{ values.team }}/dev/harbor-pull (keys: registry, username,
# password) — written by onboarding, NOT the student build.
#
# The `.dockerconfigjson` template below is Go-template ({{ }}) consumed by ESO at
# sync time; nunjucks (Backstage, ${{ }}) leaves single-brace {{ }} untouched, so the
# template ships verbatim. .devops/ci/** is also under copyWithoutTemplating, but this
# file is NOT under ci/ — its only nunjucks tokens are the intended ${{ values.* }}.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-pull
  namespace: ${{ values.team }}-dev
  labels:
    app.kubernetes.io/name: ${{ values.appName }}
    platform.capstone/component: tenant
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-tenant
    kind: SecretStore
  target:
    name: harbor-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"{{ .registry }}":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: registry
      remoteRef:
        key: tenants/${{ values.team }}/dev/harbor-pull
        property: registry
    - secretKey: username
      remoteRef:
        key: tenants/${{ values.team }}/dev/harbor-pull
        property: username
    - secretKey: password
      remoteRef:
        key: tenants/${{ values.team }}/dev/harbor-pull
        property: password
