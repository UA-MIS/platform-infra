# harbor-pull — image-pull cred as an ESO ExternalSecret (ADR-030 B1).
#
# The workload SA sets imagePullSecrets:[harbor-pull] (base serviceaccount.yaml), so
# the pod needs a `kubernetes.io/dockerconfigjson` Secret named `harbor-pull` to pull
# from the PRIVATE Harbor team project. This was a SealedSecret in Phase-1; in v1 the
# robot's docker creds live in Vault and ESO materializes the dockerconfigjson here.
#
# REQUIRED (not zero-config): unlike app-secret, image pull cannot work without this,
# so the default deletionPolicy (Retain) is kept — a missing Vault value SURFACES as
# SecretSyncError so the operator knows to run onboarding. The platform onboarding
# step (per the tenant-PR checklist) mints the pull robot and writes its creds to
# Vault at secret/data/tenants/${{ values.team }}/dev/harbor-pull (keys: registry,
# username, password) — NOT the student build.
#
# The `.dockerconfigjson` template below is Go-template ({{ }}) consumed by ESO at
# sync time; nunjucks (Backstage, ${{ }}) leaves single-brace {{ }} untouched, so the
# template ships verbatim. .devops/ci/** is also under copyWithoutTemplating, but this
# file is NOT under ci/ — its only nunjucks tokens are the intended ${{ values.* }}.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-pull
  namespace: ${{ values.team }}-dev
  labels:
    app.kubernetes.io/name: ${{ values.appName }}
    platform.capstone/component: tenant
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-tenant
    kind: SecretStore
  target:
    name: harbor-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"{{ .registry }}":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: registry
      remoteRef:
        key: tenants/${{ values.team }}/dev/harbor-pull
        property: registry
    - secretKey: username
      remoteRef:
        key: tenants/${{ values.team }}/dev/harbor-pull
        property: username
    - secretKey: password
      remoteRef:
        key: tenants/${{ values.team }}/dev/harbor-pull
        property: password
