# Dedicated ServiceAccount for the workload. The app needs no API access
# (least privilege — §3.4 omits egress to the API server), so no RBAC is bound.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${{ values.appName }}
  labels:
    app.kubernetes.io/name: ${{ values.appName }}
automountServiceAccountToken: false
# Image pull from the PRIVATE Harbor team project (#C3): the workload image lives in
# a private Harbor project, so the pod needs the `harbor-pull` imagePullSecret to pull
# it — without this the Deployment ImagePullBackOffs (the "sample app won't deploy"
# gap). v1: `harbor-pull` is a docker-registry SealedSecret minted by the platform at
# onboarding (`make harbor-robot`) and applied into <team>-<env> out-of-band — NOT wired
# in the overlay. (A reserved ESO model exists: overlays/<env>/harbor-pull.externalsecret
# .yaml + Vault path secret/tenants/<team>/<env>/harbor-pull, commented out pending the
# robot-creds-in-Vault decision.) Set on the SA (not the pod spec) so it applies to every
# pod using this SA. The robot is pull-only (least privilege).
imagePullSecrets:
  - name: harbor-pull
