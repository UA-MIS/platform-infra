# Dedicated ServiceAccount for the workload. The app needs no API access
# (least privilege — §3.4 omits egress to the API server), so no RBAC is bound.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${{ values.appName }}
  labels:
    app.kubernetes.io/name: ${{ values.appName }}
automountServiceAccountToken: false
# Image pull from the PRIVATE Harbor team project (#C3): the workload image lives in
# a private Harbor project, so the pod needs the `harbor-pull` imagePullSecret to pull
# it — without this the Deployment ImagePullBackOffs (the "sample app won't deploy"
# gap). `harbor-pull` is a docker-registry Secret materialized by ESO from Vault via
# the per-env harbor-pull ExternalSecret (overlays/<env>/harbor-pull.externalsecret.yaml);
# the platform mints the pull robot at onboarding and writes its creds to Vault at
# secret/tenants/<team>/<env>/harbor-pull. Set on the SA (not the pod spec) so it
# applies to every pod using this SA. The robot is pull-only (least privilege).
imagePullSecrets:
  - name: harbor-pull
