# SealedSecret -> Secret `backstage-postgresql` in the backstage namespace (P5).
#
# Consumed by the bundled Postgres (the chart's `postgresql` Bitnami subchart) via
# `postgresql.auth.existingSecret: backstage-postgresql`. Bitnami's postgresql chart
# reads these FIXED key names:
#   postgres-password : the `postgres` superuser password
#   password          : the application user (`bn_backstage`) password — this is the
#                       value Backstage's DB connection uses, so it MUST equal the
#                       POSTGRES_PASSWORD key in the backstage-process-secrets Secret
#                       (both sealed from the SAME generated value).
#
# ⚠ PLACEHOLDER — NOT A REAL SEALED SECRET (inert base64 of "PLACEHOLDER"; will NOT
# decrypt against the live controller). Re-seal with real values before go-live, e.g.:
#
#   PG=$(openssl rand -base64 24)
#   kubectl create secret generic backstage-postgresql -n backstage \
#     --from-literal=postgres-password="$(openssl rand -base64 24)" \
#     --from-literal=password="$PG" \
#     --dry-run=client -o yaml \
#   | kubeseal --controller-namespace kube-system \
#       --controller-name sealed-secrets-controller \
#       --format yaml --namespace backstage > platform-services/backstage/sealedsecret-postgresql.yaml
#   # ...and seal the SAME $PG as POSTGRES_PASSWORD into backstage-process-secrets.
#
# Sealed for the backstage namespace (strict scope) — only decrypts there.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: backstage-postgresql
  namespace: backstage
  labels:
    platform.capstone/component: platform
  annotations:
    platform.capstone/placeholder: "true"
spec:
  encryptedData:
    # base64("PLACEHOLDER") — inert; re-seal before go-live (see header).
    postgres-password: UExBQ0VIT0xERVI=
    password: UExBQ0VIT0xERVI=
  template:
    metadata:
      name: backstage-postgresql
      namespace: backstage
      labels:
        platform.capstone/component: platform
    type: Opaque
