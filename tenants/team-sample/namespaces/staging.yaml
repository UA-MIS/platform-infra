# ============================================================================
# <team>-staging namespace bundle — non-prod tier (§3.1–§3.4).
# Tokens: sample, 2026-fall.  Bundles, in dependency order:
#   Namespace -> ResourceQuota -> LimitRange -> NetworkPolicies -> Role/RoleBinding
# Every object carries the mandatory platform.capstone/{team,semester,env} labels.
# ============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: sample-staging
  labels:
    app.kubernetes.io/managed-by: argocd
    platform.capstone/team: sample
    platform.capstone/semester: 2026-fall
    platform.capstone/env: staging
    # Pod Security Admission: enforce the restricted profile cluster-side, so the
    # tenancy guarantee does not depend solely on the workload's own securityContext.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.31
---
# ResourceQuota — non-prod starting values (§3.2). Tunable per team later.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: sample-staging
  labels:
    platform.capstone/team: sample
    platform.capstone/semester: 2026-fall
    platform.capstone/env: staging
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "10"
    services: "5"
---
# LimitRange — per-container defaults + ceiling (§3.2). Ensures every pod gets
# requests/limits even if the workload omits them, so the quota is enforceable.
apiVersion: v1
kind: LimitRange
metadata:
  name: container-limits
  namespace: sample-staging
  labels:
    platform.capstone/team: sample
    platform.capstone/semester: 2026-fall
    platform.capstone/env: staging
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "1"
        memory: 1Gi
---
# NetworkPolicy 1/3 — DEFAULT-DENY ingress + egress (§3.4). Selects all pods;
# with no allow rules this denies everything until the allowances below add back
# the minimum. Cross-team traffic is denied by construction (no rule references
# another team's namespace).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: sample-staging
  labels:
    platform.capstone/team: sample
    platform.capstone/semester: 2026-fall
    platform.capstone/env: staging
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# NetworkPolicy 2/3 — allow ingress from Traefik to app pods, and intra-namespace
# pod<->pod (§3.4). Traefik runs in kube-system on k3s/k3d; we select it by
# namespace label. Intra-ns is allowed so an app's own components can talk.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-traefik-and-intra-ns
  namespace: sample-staging
  labels:
    platform.capstone/team: sample
    platform.capstone/semester: 2026-fall
    platform.capstone/env: staging
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # From the bundled Traefik (kube-system on k3s/k3d). kube-system carries the
    # well-known kubernetes.io/metadata.name label set by the API server.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
    # Intra-namespace: pods of THIS team's namespace may talk to each other.
    - from:
        - podSelector: {}
---
# NetworkPolicy 3/3 — allow egress to cluster DNS only, plus intra-namespace
# (§3.4). The sample app needs DNS; it does NOT need the API server (its SA token
# is not even mounted), so no API egress is granted — least privilege.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dns-and-intra-ns
  namespace: sample-staging
  labels:
    platform.capstone/team: sample
    platform.capstone/semester: 2026-fall
    platform.capstone/env: staging
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS to CoreDNS in kube-system (UDP + TCP 53).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Intra-namespace egress so the app's own components can reach each other.
    - to:
        - podSelector: {}
---
# Team Role — namespaced, workload-scoped (§3.3). Read + limited write on the
# kinds a student debugs/deploys. NEVER: Secrets (raw), Nodes, RBAC, Quota,
# LimitRange, NetworkPolicy (all platform-managed). No cluster-admin anywhere.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: team-developer
  namespace: sample-staging
  labels:
    platform.capstone/team: sample
    platform.capstone/semester: 2026-fall
    platform.capstone/env: staging
rules:
  # Inspect + manage own workloads.
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "serviceaccounts"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["bitnami.com"]
    resources: ["sealedsecrets"]
    verbs: ["get", "list", "watch"]
  # Debugging: read pods, logs, and exec — but NOT delete pods or read Secrets.
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
# RoleBinding — binds the team Role to the team's Keycloak group (Phase 2) /
# local admin (Phase 1). Scoped to THIS namespace only; no ClusterRoleBinding.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: team-developer
  namespace: sample-staging
  labels:
    platform.capstone/team: sample
    platform.capstone/semester: 2026-fall
    platform.capstone/env: staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: team-developer
subjects:
  # Phase 2: the Keycloak-federated group for this team. Phase 1: demonstrated
  # via the local argocd admin; this Group subject is inert until OIDC is wired.
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: sample-developers
