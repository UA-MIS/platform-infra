# ============================================================================
# Ephemeral PREVIEW ApplicationSet (§2.4, D-009) — Phase-1 GIT-BRANCH STAND-IN.
# Tokens: __TEAM__, __APPNAME__ (the app repo, UA-MIS/<appName>), __SEMESTER__, __PRNUM__.
#
# D-009: Phase 1 proves ephemeral preview namespaces WITHOUT a live GitHub org.
# The PRODUCTION trigger is the ArgoCD pullRequest generator (commented seam at
# the bottom); until GITHUB_ORG previews are wired we use a LIST generator seeded
# with the known feature branch + preview number. This exercises the SAME
# primitive (one App per "PR" -> ephemeral <team>-pr-<n> ns -> auto-pruned when
# the element is removed) so the swap to the live PR generator is one config edit
# in promotion.yaml — nothing else changes.
#
# Each preview App ALSO needs its namespace guardrails (quota/limitrange/netpol/
# RBAC from namespaces/preview.yaml). The orchestrating tenant applies those with
# __PRNUM__ substituted; see namespaces/preview.yaml header.
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: __TEAM__-preview
  namespace: argocd
  labels:
    platform.capstone/team: __TEAM__
    platform.capstone/semester: __SEMESTER__
    platform.capstone/component: tenant
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    # ---- list generator: EMPTY by default (no previews until opted in) ---------
    # v1: ships with NO elements, so a fresh tenant creates ZERO preview Apps (an
    # empty list generator is valid and produces nothing). This is deliberate — the
    # PRODUCTION trigger is the ArgoCD pullRequest generator (commented seam at the
    # bottom); the list is only a stand-in. A demo element here (number:1 +
    # branch:preview-demo) would make a real tenant try to deploy a preview from a
    # branch that doesn't exist → a crash-loop, so it is NOT shipped. To demo a
    # preview manually, add an element (number + an existing branch); to wire live
    # PR previews, swap to the pullRequest generator below (post-v1).
    - list:
        elements: []
  template:
    metadata:
      name: '__TEAM__-pr-{{.number}}'
      labels:
        platform.capstone/team: __TEAM__
        platform.capstone/semester: __SEMESTER__
        platform.capstone/env: preview
    spec:
      project: __TEAM__
      source:
        repoURL: https://github.com/UA-MIS/__APPNAME__
        targetRevision: '{{.branch}}'
        path: .devops/chart/overlays/preview
      destination:
        server: https://kubernetes.default.svc
        namespace: '__TEAM__-pr-{{.number}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true        # preview ns is created on demand
        retry:
          limit: 5
          backoff: { duration: 5s, factor: 2, maxDuration: 3m }

# ============================================================================
# PRODUCTION SEAM (swap in when GITHUB_ORG previews are wired — D-007/D-009).
# Replace the `list` generator above with the pullRequest generator below. The
# template is otherwise unchanged: {{.number}} and {{.head_sha}} come from the
# generator instead of the hand-maintained list. This is the SINGLE configured
# place for the PR->preview trigger (promotion.yaml references it).
#
#  generators:
#    - pullRequest:
#        github:
#          owner: UA-MIS
#          repo: __APPNAME__
#          # tokenRef: { secretName: github-token, key: token }   # via SealedSecret
#        requeueAfterSeconds: 30
#  # template.spec.source.targetRevision: '{{.head_sha}}'
#  # template.spec.source.path: .devops/chart/overlays/preview
#
# The pullRequest generator's native lifecycle deletes the Application when the
# PR closes/merges; `prune: true` then tears down the namespace. No custom
# teardown controller needed (§2.4).
# ============================================================================
