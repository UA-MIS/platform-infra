# The "platform" AppProject ‚Äî the cluster-scoped fence for platform-engineer-owned
# Applications ONLY (the root app, platform-services, and the per-team bootstrap
# Apps the tenants-appset emits). This is the privileged project: it MAY create
# cluster-scoped resources (CRDs, ClusterRoles, the sealed-secrets controller,
# cert-manager, etc.). NO team workload ever lands here ‚Äî teams get their own
# per-team AppProject (tenants/_template/appproject.yaml), which whitelists only
# their namespaces and forbids cluster-scoped resources (¬ß2.1 boundary rule).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  labels:
    platform.capstone/component: platform
  # Keep the project from being pruned if its parent app is ever removed.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Platform-engineer-owned cluster services and tenant bootstrap apps.

  # Only the platform-infra repo feeds this project. Team app repos are NOT here
  # ‚Äî they are whitelisted per-team in each team's own AppProject.
  sourceRepos:
    - https://github.com/UA-MIS/platform-infra
    - https://github.com/UA-MIS/platform-infra.git
    # --- P2.2 (deploy method A, D-022): pinned external Helm chart repos for
    #     platform services that are Helm-only upstream. This widens the supply-chain
    #     allowlist by ONE named repo per chart; security audits each addition; chart
    #     VERSIONS are pinned in the Application (targetRevision). If the human picks
    #     method B (kustomize helm-inflation rendered from platform-infra), REVERT
    #     these ‚Äî they're only needed for Helm-SOURCE Applications.
    - https://helm.goharbor.io        # Harbor (platform-harbor Application)
    # ARC (P2.3, D-032): GitHub's official OCI Helm charts for the Actions Runner
    # Controller (controller + runner scale set). OCI registry ‚Äî ONE named source,
    # chart versions pinned in the Applications (gha-runner-scale-set[-controller]
    # @ 0.14.2). ‚öÝ INSTALL-OWNED: like the helm.goharbor.io add, this reaches the
    # live `platform` AppProject only via `make bootstrap`/`make bootstrap-reapply`
    # (bootstrap/platform-appproject.yaml is not GitOps-reconciled) ‚Äî re-apply after
    # merge or the ARC apps will InvalidSpecError "repo not permitted".
    - ghcr.io/actions/actions-runner-controller-charts   # ARC (platform-arc-* Applications)
    # Rook-Ceph (P4, ¬ß3.4, D-035): the operator + cluster Helm charts (replicated
    # block storage on the 3-node hardware). ONE named source; chart versions pinned
    # in the Applications (rook-ceph + rook-ceph-cluster @ v1.20.1). ‚öÝ INSTALL-OWNED
    # (same as the Harbor/ARC adds): reaches the live `platform` AppProject only via
    # `make bootstrap`/`make bootstrap-reapply` ‚Äî re-apply after merge or the
    # platform-rook-ceph-* apps will InvalidSpecError "repo not permitted".
    - https://charts.rook.io/release    # Rook-Ceph (platform-rook-ceph-* Applications)

  # Platform services are cluster-wide; allow any namespace on the in-cluster API.
  destinations:
    - server: https://kubernetes.default.svc
      namespace: '*'

  # The platform project is privileged BY DESIGN: it installs CRDs and
  # cluster-scoped controllers. This is the ONE project allowed to do so.
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
