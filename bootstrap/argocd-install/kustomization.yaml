# ArgoCD install (T3) — pinned to a specific release for reproducibility.
#
# We layer the upstream stable install manifest (pinned by git tag) into the
# `argocd` namespace via kustomize. `make bootstrap` applies this once to a fresh
# cluster, then applies bootstrap/root-app.yaml so ArgoCD manages everything else.
#
# Pinning: the remote base is pinned to tag v3.4.3 (no :latest, no HEAD). Bump
# the ref deliberately. Phase 1 is single-replica (the non-HA `install.yaml`);
# HA / multi-replica is a Phase-3 concern per the T3 spec (see values-notes.md).
#
# Why the upstream raw manifest rather than the Helm chart: it is the canonical,
# self-contained install ArgoCD itself publishes; it needs no Helm at apply time
# (kubectl/kustomize only), keeping `make bootstrap` dependency-light.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  # Pinned upstream non-HA install (CRDs + controller + repo-server + server +
  # redis + applicationset controller). Pinned by the ?ref=v3.4.3 git tag.
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.3/manifests/install.yaml

# Phase-1 server config: run the API server in HTTP mode behind Traefik (the
# wildcard TLS cert from cert-manager terminates at the ingress, T4). This is a
# strategic-merge patch so it ADDS the data block without touching the rest of
# the upstream ConfigMap.
patches:
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cmd-params-cm
      data:
        server.insecure: "true"
    target:
      kind: ConfigMap
      name: argocd-cmd-params-cm

  # --- P2.1 (§1.1, D-017): OIDC -> standalone platform Dex broker ---
  # Strategic-merge patch ADDS `url` + `oidc.config` to the upstream argocd-cm
  # (the full upstream CM is present in this rendered bundle, so the merge is
  # additive — it does not drop the install's resource.customizations.* keys).
  # We use `oidc.config` (external provider) NOT the bundled `dex.config`, because
  # §1.1 runs ONE shared platform Dex that Backstage/Grafana/Harbor also federate
  # through. The clientSecret derefs the SealedSecret-materialised Secret
  # `argocd-dex-client` (synced by the argocd-config platform-service); it MUST
  # equal Dex's `argocd` staticClient secret.
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cm
      data:
        url: https://argocd.127-0-0-1.sslip.io
        oidc.config: |
          name: Dex (GitHub)
          issuer: https://id.127-0-0-1.sslip.io
          clientID: argocd
          clientSecret: $argocd-dex-client:oidc.dex.clientSecret
          requestedScopes:
            - openid
            - profile
            - email
            - groups
          requestedIDTokenClaims:
            groups:
              essential: true
    target:
      kind: ConfigMap
      name: argocd-cm

  # --- P2.1 (§1.1): RBAC binds the OIDC `groups` claim (GitHub Teams via Dex) ---
  # Additive strategic-merge into the upstream argocd-rbac-cm. capstone-admin Team
  # -> admin; UA-MIS org member -> read-only baseline; per-team Teams -> scoped
  # roles (team-sample shown as the onboarding pattern). Local `admin` stays
  # break-glass (untouched).
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-rbac-cm
      data:
        policy.default: role:readonly
        scopes: '[groups]'
        policy.csv: |
          g, UA-MIS:capstone-admin, role:admin
          g, UA-MIS, role:readonly
          p, role:team-sample, applications, get, team-sample/*, allow
          p, role:team-sample, applications, sync, team-sample/*, allow
          p, role:team-sample, logs, get, team-sample/*, allow
          p, role:team-sample, projects, get, team-sample, allow
          g, UA-MIS:team-sample, role:team-sample
    target:
      kind: ConfigMap
      name: argocd-rbac-cm

labels:
  - pairs:
      platform.capstone/component: platform
    includeSelectors: false
