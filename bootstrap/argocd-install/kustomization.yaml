# ArgoCD install (T3) — pinned to a specific release for reproducibility.
#
# We layer the upstream stable install manifest (pinned by git tag) into the
# `argocd` namespace via kustomize. `make bootstrap` applies this once to a fresh
# cluster, then applies bootstrap/root-app.yaml so ArgoCD manages everything else.
#
# Pinning: the remote base is pinned to tag v3.4.3 (no :latest, no HEAD). Bump
# the ref deliberately. Phase 1 is single-replica (the non-HA `install.yaml`);
# HA / multi-replica is a Phase-3 concern per the T3 spec (see values-notes.md).
#
# Why the upstream raw manifest rather than the Helm chart: it is the canonical,
# self-contained install ArgoCD itself publishes; it needs no Helm at apply time
# (kubectl/kustomize only), keeping `make bootstrap` dependency-light.
#
# ⚠ INVARIANT — THIS INSTALL OWNS ONLY argocd-cm's `resource.customizations.*` KEYS.
# The upstream install.yaml ships an argocd-cm carrying only `resource.customizations.*`
# / `resource.exclusions`. It MUST NOT declare ui.*/oidc.* keys — those are owned
# SOLELY by the GitOps platform-svc-argocd-config app via its ServerSideApply field
# manager (see platform-services/argocd-config/kustomization.yaml). This split is why
# `kubectl apply -k bootstrap/argocd-install --server-side --force-conflicts` (what
# `make bootstrap` + `make bootstrap-reapply` run) is safe: SSA only touches the
# install's own fields. If a stale `kubectl.kubernetes.io/last-applied-configuration`
# annotation (from a client-side argocd-cm apply) is ever present, the CSA->SSA
# migration prunes the ui.*/oidc keys and wipes theme+SSO — so NEVER client-side
# `kubectl apply` argocd-cm, and keep this install's argocd-cm free of ui.*/oidc keys.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  # Pinned upstream non-HA install (CRDs + controller + repo-server + server +
  # redis + applicationset controller). Pinned by the ?ref=v3.4.3 git tag.
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.3/manifests/install.yaml

# Phase-1 server config: run the API server in HTTP mode behind Traefik (the
# wildcard TLS cert from cert-manager terminates at the ingress, T4). This is a
# strategic-merge patch so it ADDS the data block without touching the rest of
# the upstream ConfigMap.
patches:
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cmd-params-cm
      data:
        server.insecure: "true"
    target:
      kind: ConfigMap
      name: argocd-cmd-params-cm

  # UA-MIS UI theme (P2.1 THEME): mount the custom-CSS ConfigMap into argocd-server
  # at /shared/app/custom so argocd-cm's `ui.cssurl: ./custom/ua-mis.css` resolves.
  # ArgoCD docs require the stylesheet under a SUBDIR of /shared/app for the correct
  # MIME type. WHY HERE (and not the self-healing platform-service): the argocd-server
  # Deployment is INSTALL-OWNED (kubectl Apply field-manager — the application-controller
  # does not manage the upstream Deployment), so the volume must be set at install time,
  # exactly like `server.insecure` above. The CSS ConfigMap (argocd-ui-theme-cm) itself
  # is generated by the argocd-config platform-service and self-heals via GitOps; only
  # the volume *wiring* lives here. Strategic-merge: adds the volume + mount without
  # touching the rest of the upstream container spec.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-server
      spec:
        template:
          spec:
            containers:
              - name: argocd-server
                volumeMounts:
                  - name: ua-mis-theme
                    mountPath: /shared/app/custom
            volumes:
              - name: ua-mis-theme
                configMap:
                  name: argocd-ui-theme-cm
    target:
      kind: Deployment
      name: argocd-server

  # NOTE (p2.1-fix): the argocd-cm OIDC config + argocd-rbac-cm group->role bindings
  # were MOVED OUT of here into the `argocd-config` platform-service
  # (platform-services/argocd-config/) so they self-heal via ArgoCD GitOps sync.
  # Here they only applied at `make bootstrap` time and went stale after sync. The
  # bootstrap install now carries ONLY `server.insecure` (genuinely install-time:
  # the server flag must be set before ArgoCD first serves). See argocd-config/.

labels:
  - pairs:
      platform.capstone/component: platform
    includeSelectors: false
