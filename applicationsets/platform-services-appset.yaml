# platform-services ApplicationSet (§2.1). A git DIRECTORY generator over
# platform-services/*/ — each service directory (cert-manager, traefik,
# sealed-secrets — wired in T4) becomes one Application in the `platform`
# project. Adding a platform service = adding a directory under platform-services/.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-services
  namespace: argocd
  labels:
    platform.capstone/component: platform
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/UA-MIS/platform-infra
        revision: HEAD
        directories:
          - path: platform-services/*
          # EXCLUDE harbor-onboarding/: it is a per-team Job TEMPLATE (contains a
          # literal `__TEAM__` placeholder substituted by `make harbor-onboard
          # NAME=<name>`), NOT a GitOps-synced service. Without this exclude the
          # appset generates `platform-svc-harbor-onboarding`, which fails to sync
          # ("harbor-onboard-__TEAM__" is an invalid RFC-1123 name) and sits
          # OutOfSync/Missing forever. It has no kustomization.yaml for the same
          # reason. Applied imperatively per team, not reconciled.
          - path: platform-services/harbor-onboarding
            exclude: true
          # EXCLUDE traefik/ (D-042/ADR-028): Traefik is no longer a kustomize-dir
          # service configured via the (k3s-only, inert-on-Talos) HelmChartConfig.
          # It is now a standalone Helm-source Application (applicationsets/traefik-app.yaml,
          # modeled on harbor/backstage) installing the real traefik/traefik chart.
          # The platform-services/traefik/ dir is DELETED in the same change; this
          # exclude documents intent + is belt-and-suspenders so the dir-generator
          # never re-emits a `platform-svc-traefik` if the dir reappears.
          - path: platform-services/traefik
            exclude: true
          # EXCLUDE backstage/ (P5/M1, D-046): The Process is managed SOLELY by the
          # dedicated, gated Application (applicationsets/backstage-process-app.yaml) —
          # NOT by this directory generator. platform-services/backstage/ holds the ns
          # + PLACEHOLDER SealedSecrets (backstage-process-secrets / backstage-postgresql,
          # real values sealed at go-live by the live-ops batch) + the in-repo app source
          # (backstage/app/). Without this exclude the dir-generator emits
          # `platform-svc-backstage`, auto-applies the placeholder SealedSecrets, and they
          # fail-to-decrypt -> Degraded (the cloudflared #48/#49 placeholder-secret class).
          # The single-level `platform-services/*` glob doesn't descend into backstage/app/,
          # so excluding backstage/ is sufficient. At go-live the dedicated app's deploy-flip
          # (+ the live-ops batch sealing the REAL secrets) brings it up cleanly.
          - path: platform-services/backstage
            exclude: true
  template:
    metadata:
      name: 'platform-svc-{{.path.basename}}'
      labels:
        platform.capstone/component: platform
    spec:
      project: platform
      source:
        repoURL: https://github.com/UA-MIS/platform-infra
        targetRevision: HEAD
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        # Neutral default namespace. Each platform service pins its OWN namespace
        # inside its manifests (cert-manager -> cert-manager ns + its own
        # Namespace object; sealed-secrets + traefik -> kube-system), which
        # overrides this for namespaced objects; cluster-scoped objects
        # (CRDs, ClusterIssuers) ignore it. Using kube-system (always present)
        # avoids creating empty, unused per-service namespaces.
        namespace: kube-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          # No CreateNamespace: services that need a namespace ship their own
          # Namespace object (cert-manager); the rest target kube-system.
          - ServerSideApply=true   # large CRDs (cert-manager) need SSA
        retry:
          limit: 5
          backoff: { duration: 5s, factor: 2, maxDuration: 3m }
