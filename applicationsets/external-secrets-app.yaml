# External Secrets Operator Application (ADR-030 model B1 — the v1 secrets model
# "no secret material in git"). The ESO controller reads from HashiCorp Vault
# (applicationsets/vault-app.yaml) over the Vault Kubernetes auth method and
# materializes namespaced Kubernetes Secrets from `ExternalSecret` declarations
# (key NAMES + remoteRefs only) committed to tenant repos. Helm-source Application,
# deploy method A (D-028): pinned chart + the chart repo added to the `platform`
# AppProject sourceRepos allowlist (bootstrap/platform-appproject.yaml in this PR;
# security audits the addition).
#
# Installs the controller + the external-secrets.io CRDs (SecretStore,
# ClusterSecretStore, ExternalSecret, PushSecret, ...) into external-secrets.
# The CRDs ship WITH the chart (installCRDs=true is the chart default — verified by
# rendering external-secrets 2.6.0), so this single Application brings the operator
# AND its CRDs. The Vault wiring (ClusterSecretStore, per-tenant SecretStore,
# Vault k8s-auth role/policy) is applied OUT-OF-BAND by the human runbook
# (platform-services/external-secrets/README.md) AFTER `vault operator init` —
# the ClusterSecretStore cannot reconcile until Vault is initialized+unsealed and
# its k8s auth role exists, so it is NOT auto-synced here (would sit SecretSyncError).
#
# Chart: external-secrets 2.6.0 (appVersion v2.6.0), pinned (bump deliberately).
# Root-app recurses applicationsets/, so this Application is registered.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-external-secrets
  namespace: argocd
  labels:
    platform.capstone/component: platform
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # CRDs+controller after Vault (vault-app = wave 0)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://charts.external-secrets.io   # PINNED chart repo (sourceRepos allowlist)
    chart: external-secrets
    targetRevision: 2.6.0                          # pinned chart version (appVersion v2.6.0); no ^/~/latest
    helm:
      releaseName: external-secrets
      values: |
        # Single-replica controller + webhook + cert-controller for the homelab
        # (Phase-4 3-node cluster; HA the controller later if it ever becomes a
        # reconcile bottleneck — it is not on the secret data path at app runtime,
        # only at sync time). The CRDs install with the chart (installCRDs default
        # true); do NOT also point a separate CRD Application at them.
        replicaCount: 1
        # Leave installCRDs at the chart default (true) — this app owns the CRDs.
        # webhook + cert-controller single-replica too (chart sub-charts).
        webhook:
          replicaCount: 1
        certController:
          replicaCount: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false   # external-secrets ns ships via platform-services/external-secrets
      - ServerSideApply=true    # the external-secrets.io CRDs are large — SSA avoids the 256KB anno limit
    retry:
      limit: 5
      backoff: { duration: 10s, factor: 2, maxDuration: 5m }
