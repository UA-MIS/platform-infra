# Harbor OIDC config Application (P2.2, SEC-012) — drives the configure-oidc Job
# (platform-services/harbor-oidc-config/). SEPARATE from the Harbor Helm
# Application (applicationsets/harbor-app.yaml) because:
#   - the Helm-source app has no kustomize path to carry this Job, and
#   - this must apply AFTER Harbor core is up (the Job itself waits on core).
#
# The Job is a REGULAR ArgoCD resource (Replace=true), NOT a sync hook: a hook-only
# Application has an empty regular resource set, so the auto-sync controller never
# starts a sync operation and the hook never fires (observed live: app Synced with
# resources:[], Harbor auth_mode still db_auth). As a regular Job, the app goes
# OutOfSync when this object appears -> syncs -> Job runs. Self-triggering, idempotent
# (PUT configurations converges; Replace re-runs only on a manifest change). Renders
# into the harbor namespace where the harbor-admin + harbor-oidc Secrets live.
#
# Root-app recurses applicationsets/, so this Application is registered
# automatically. Lives in the `platform` AppProject.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-harbor-oidc-config
  namespace: argocd
  labels:
    platform.capstone/component: platform
  # Sync-wave 1: after the Harbor chart Application (default wave 0) so the harbor
  # namespace + core exist; the Job additionally waits on core readiness itself.
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/UA-MIS/platform-infra
    targetRevision: HEAD
    path: platform-services/harbor-oidc-config
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false      # harbor ns ships via platform-services/harbor
      - ServerSideApply=true
    retry:
      limit: 5
      backoff: { duration: 10s, factor: 2, maxDuration: 5m }
