# Harbor OIDC config Application (P2.2, SEC-012) — drives the configure-oidc Sync
# hook Job (platform-services/harbor-oidc-config/). SEPARATE from the Harbor Helm
# Application (applicationsets/harbor-app.yaml) because:
#   - the Helm-source app has no kustomize path to attach a hook to, and
#   - this must apply AFTER Harbor core is up (the Job itself waits on core, and
#     sync-waves order it after the chart).
#
# The Job is an argocd.argoproj.io/hook: PostSync inside this app, so it runs on
# each sync of THIS app and is idempotent (PUT configurations converges;
# hook-delete-policy reaps it). Renders into the harbor namespace where the
# harbor-admin + harbor-oidc Secrets live.
#
# Root-app recurses applicationsets/, so this Application is registered
# automatically. Lives in the `platform` AppProject.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-harbor-oidc-config
  namespace: argocd
  labels:
    platform.capstone/component: platform
  # Sync-wave 1: after the Harbor chart Application (default wave 0) so the harbor
  # namespace + core exist; the Job additionally waits on core readiness itself.
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/UA-MIS/platform-infra
    targetRevision: HEAD
    path: platform-services/harbor-oidc-config
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false      # harbor ns ships via platform-services/harbor
      - ServerSideApply=true
    retry:
      limit: 5
      backoff: { duration: 10s, factor: 2, maxDuration: 5m }
