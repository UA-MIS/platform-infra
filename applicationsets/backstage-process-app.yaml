# Backstage "The Process" Application (P5, §1.6) — the platform's developer portal: the
# software catalog + Scaffolder golden-path templates + TechDocs, with human SSO via
# the SAME shared Dex broker as ArgoCD/Harbor. DEPLOY METHOD = (A) Helm-source
# Application (the Harbor/ARC/Rook/metrics-server precedent, D-022/D-028): the chart
# is pinned + its OCI repo allowlisted in the `platform` AppProject sourceRepos
# (bootstrap/platform-appproject.yaml — INSTALL-OWNED, re-apply after merge).
#
# Root-app recurses applicationsets/, so this Application is registered. The namespace
# + SealedSecret PREREQS ship separately via the platform-services-appset
# (platform-services/backstage/), which must sync FIRST — same split as Harbor.
#
# ⚠ AHEAD-OF-NEED PREP — DO NOT DEPLOY YET. The Process goes live AFTER (1) the cluster
#   heals (Cilium swap), (2) the Phase-3 domain cutover, and (3) the one-time custom
#   Backstage image is built + pushed to Harbor. See platform-services/backstage/README.md
#   "To go live" checklist. Until then this renders + reviews but is intentionally not synced.
#
# ── THE CUSTOM IMAGE (the load-bearing prereq) ─────────────────────────────────
# Backstage is NOT a configure-and-run server: you scaffold YOUR OWN app with
# `npx @backstage/create-app`, wire plugins (OIDC auth provider, the Scaffolder
# actions, the catalog), `yarn build-image`, and push to Harbor. The chart's default
# image `ghcr.io/backstage/backstage:latest` is a DEMO and has neither our Dex auth
# provider nor The Process templates — so `image.repository` below points at the Harbor
# image we will build. Until that image exists the tag is a PLACEHOLDER (`v0.1.0`).
#
# Chart: backstage 2.8.2 (OCI: ghcr.io/backstage/charts), pinned. Bundles the Bitnami
# postgresql subchart (postgresql.enabled=true) on ceph-block.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-backstage-process
  namespace: argocd
  labels:
    platform.capstone/component: platform
  annotations:
    # GO-LIVE (M1): deploy-status flipped to live, auto-sync enabled below, image.tag
    # set to the first CI-built SHA, and the platform-services/backstage appset-exclude
    # removed (so the ns + REAL sealed secrets sync as prereqs — same split as Harbor).
    platform.capstone/deploy-status: "live"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: ghcr.io/backstage/charts          # PINNED OCI chart repo (sourceRepos allowlist)
    chart: backstage
    targetRevision: 2.8.2                       # pinned chart version (no ^/~/latest)
    helm:
      releaseName: backstage
      values: |
        # ── The portal pod ────────────────────────────────────────────────────
        backstage:
          replicas: 1                           # single replica for the 3-box cluster
          # Recreate so plugin DB migrations never run concurrently (chart guidance:
          # a single Backstage pod at a time when migrations run on startup).
          strategy:
            type: Recreate
          image:
            # THE CUSTOM IMAGE built from the in-repo Backstage app (platform-services/
            # backstage/app) by ARC-CI (Kaniko) + pushed to Harbor (see README "To go
            # live"). Lives in the DEDICATED `backstage` Harbor project (ADR-029 / D-046,
            # its own CI push robot) — NOT the shared `library` project. PLACEHOLDER tag
            # until the first build lands; the CI build tags by commit SHA.
            registry: harbor.capstone.uamishub.com
            repository: backstage/backstage-process
            tag: 87c9dc3a8fb8                     # first SUCCESSFUL CI build (ARC/Kaniko run 27839922146, digest sha256:a27b13d) — #60 merge commit
            pullPolicy: IfNotPresent
            # Pull from the private Harbor `backstage` project via a robot
            # imagePullSecret (`harbor-pull`, minted at go-live by `make harbor-robot
            # NAME=backstage ENV=...` — same robot pattern as team workloads, see README).
            pullSecrets:
              - harbor-pull

          # Modest requests for the 3-OptiPlex converged cluster (resource-governance
          # backlog: small requests). Limits give headroom for the Node backend +
          # plugin migrations without starving the box.
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi

          # OIDC client secret + backend signing key + DB password are env-injected
          # from the SealedSecret (platform-services/backstage/sealedsecret-oidc.yaml).
          extraEnvVarsSecrets:
            - backstage-process-secrets

          # app-config.production.yaml baked into the custom image is the SOURCE OF TRUTH
          # for auth + integrations; this block is MERGED on top (chart -> ConfigMap ->
          # $APP_CONFIG_*). Kept to the host/deploy seams only (app/backend/catalog) — the
          # auth + github subtrees are DELIBERATELY OMITTED here so the baked config's
          # custom OIDC code resolver stays authoritative (see notes below). No secret
          # lands in git; secrets arrive via extraEnvVarsSecrets above.
          appConfig:
            app:
              title: "The Process — UA-MIS Capstone Developer Portal"
              baseUrl: https://process.capstone.uamishub.com
            organization:
              name: "UA-MIS"
            backend:
              baseUrl: https://process.capstone.uamishub.com
              listen:
                port: 7007
              cors:
                origin: https://process.capstone.uamishub.com
                methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
                credentials: true
              # Backend auth signing key from the SealedSecret (BACKEND_SECRET).
              auth:
                keys:
                  - secret: ${BACKEND_SECRET}
              database:
                client: pg
                connection:
                  host: backstage-postgresql       # the bundled Postgres Service
                  port: 5432
                  user: bn_backstage               # Bitnami app user
                  password: ${POSTGRES_PASSWORD}
            # ── SSO via the shared Dex broker ──────────────────────────────────────
            # The auth block MUST live HERE in the Helm appConfig: the chart launches the
            # backend with ONLY `--config /app/app-config-from-configmap.yaml` (this
            # overlay) — it does NOT load the image's baked app-config.production.yaml.
            # So an earlier "defer auth to the baked config" trim left NO oidc provider
            # registered → Sign In 404'd `No auth provider registered for 'oidc'` (+ the
            # default env=development). Mirror the baked block exactly. Reads the injected
            # ${AUTH_OIDC_CLIENT_ID}/${AUTH_OIDC_CLIENT_SECRET}/${BACKEND_SECRET} from
            # backstage-process-secrets; the `process` Dex staticClient is the IdP.
            # NO `signIn.resolvers` key — config resolvers take PRIORITY over the custom
            # code resolver in packages/backend, so omitting it keeps the code module
            # (Dex preferred_username -> User, catalog fallback) authoritative.
            # Org/identity gating is enforced UPSTREAM at Dex (UA-MIS org-only, SEC-007).
            auth:
              environment: production
              session:
                secret: ${BACKEND_SECRET}
              providers:
                oidc:
                  production:
                    metadataUrl: https://id.capstone.uamishub.com/.well-known/openid-configuration
                    clientId: ${AUTH_OIDC_CLIENT_ID}
                    clientSecret: ${AUTH_OIDC_CLIENT_SECRET}
                    prompt: auto
                    # THE LOGIN-LOOP FIX (M2, verdict B): request offline_access so Dex
                    # returns a refresh_token. The OAuth backend UNIONS this provider-config
                    # `additionalScopes` into the scope sent to Dex SERVER-SIDE (CookieScope
                    # Manager reads config.additionalScopes), so NO frontend change and NO
                    # rebuild are needed — this appConfig add alone fixes it. Without it Dex
                    # returns no refresh_token -> the frame handler never sets the refresh
                    # cookie -> /api/auth/oidc/refresh 401 "Missing session cookie" -> the
                    # sign-in popup loops (handler-frame 200, no throw). The SPA refresh
                    # cookie needs ONLY this token; it does NOT require
                    # auth.experimentalRefreshToken.enabled (that flag gates the separate
                    # DB-backed offline-token service for OIDC/MCP clients, not this path).
                    additionalScopes: [offline_access]

            # ── Catalog: The Process golden-path templates + seed + GitHub-org ingest ──
            # CRITICAL (PR #71): the chart launches the backend with ONLY this overlay
            # ConfigMap — it does NOT load the image's baked app-config.production.yaml. So
            # every M2 runtime config (githubOrg provider, permission.enabled, the github
            # integration) MUST live HERE, not only in the baked file. Mirror the baked
            # blocks exactly.
            catalog:
              rules:
                - allow: [Component, System, API, Resource, Location, Template, Group, User]
              locations:
                # The Scaffolder golden-path template(s), baked into the image OR
                # served from platform-infra. Pointed at the in-repo catalog dir so
                # the template shows up without rebuilding the image for content edits.
                # Still needed in M2: it seeds the `platform` Group that owns the template.
                - type: url
                  target: https://github.com/UA-MIS/platform-infra/blob/main/platform-services/backstage/catalog/all.yaml
                  rules:
                    - allow: [Template, Location, Group, System]
              # M2: GitHub-org ingestion (one Group per GitHub team, slug = <team>; one User
              # per member with spec.memberOf). This populates the ownership data the
              # sign-in resolver + permission policy depend on. Auth = the GitHub App below.
              providers:
                githubOrg:
                  id: production
                  githubUrl: https://github.com
                  orgs: ['UA-MIS']
                  schedule:
                    initialDelay: { seconds: 30 }
                    frequency: { hours: 1 }
                    timeout: { minutes: 10 }

            # ── Permission framework (M2: THE SPINE) ─────────────────────────────────
            # Turn enforcement ON so the custom CapstoneTeamPermissionPolicy filters the
            # catalog per-team. WITHOUT this the framework no-ops and serves everything
            # regardless of policy (plan R6, the §5 backend-API acceptance test catches it).
            permission:
              enabled: true

            # ── Integrations: GitHub App (M2) ────────────────────────────────────────
            # Authenticate as the UA-MIS GitHub App (ua-mis-backstage) for org ingestion
            # (and M4 Scaffolder repo create). M1 left this absent-tolerant; M2 makes it
            # load-bearing. Non-secret IDs inlined; the two SECRET values arrive as env
            # vars from backstage-process-secrets (devops seals — see README/PR handoff):
            #   GITHUB_APP_PRIVATE_KEY    — the .pem contents (multi-line)
            #   GITHUB_APP_CLIENT_SECRET  — the App client secret
            # These MUST be sealed into backstage-process-secrets BEFORE this image deploys,
            # else ingestion fails on first run and (with the M2 resolver tightening) nobody
            # can sign in (plan R1 — break-glass: roll image.tag back to the M1 SHA).
            integrations:
              github:
                - host: github.com
                  apps:
                    - appId: 4097147
                      clientId: Iv23liRQ6d2I2mibDMbY
                      clientSecret: ${GITHUB_APP_CLIENT_SECRET}
                      privateKey: ${GITHUB_APP_PRIVATE_KEY}
                      allowedInstallationOwners: ['UA-MIS']

        # ── Ingress: process.<domain> via Traefik (matches every other service) ──
        # Plain Ingress, TLS host listed but NO secretName — Traefik's default TLSStore
        # serves the cert-manager wildcard cert for *.capstone.uamishub.com (§5.1/§5.2),
        # exactly like dex/harbor/argocd. className: traefik.
        ingress:
          enabled: true
          className: traefik
          host: process.capstone.uamishub.com
          tls:
            enabled: true
            # No secretName: the wildcard cert is served via the default TLSStore.

        service:
          type: ClusterIP
          ports:
            backend: 7007

        # ── Bundled Postgres on ceph-block (Phase-4 Rook RBD, cluster default SC) ─
        # Same storage decision as Harbor: ceph-block is replica-3 RWO RBD (survives a
        # node loss); local-path does NOT exist on Talos. External DB (ua-mis-db-1 PG17)
        # is a later optimization — the bundled subchart is correct for the proof.
        postgresql:
          enabled: true
          auth:
            username: bn_backstage
            database: backstage
            existingSecret: backstage-postgresql   # our sealed keys: postgres-password, password
            # The bundled Bitnami postgresql subchart defaults its existingSecret keys
            # to `user-password`/`admin-password`, but our sealed `backstage-postgresql`
            # uses the classic `password`/`postgres-password` names (what the sealed file
            # + the live-ops batch produced). Remap so the chart reads OUR keys — this
            # fixes BOTH the postgres pod AND the Backstage container's POSTGRES_PASSWORD
            # env (the chart wires both from userPasswordKey), avoiding a reseal. Without
            # it: CreateContainerConfigError "couldn't find key user-password in Secret
            # backstage/backstage-postgresql".
            secretKeys:
              userPasswordKey: password            # app user (bn_backstage) — Backstage connects with this
              adminPasswordKey: postgres-password  # postgres superuser
          primary:
            persistence:
              enabled: true
              storageClass: ceph-block
              size: 8Gi
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: "1"
                memory: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    # GO-LIVE: auto-sync enabled (matches Harbor). prune+selfHeal keep the portal
    # reconciled to git.
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false      # backstage ns ships via platform-services/backstage
      - ServerSideApply=true       # large chart objects
    retry:
      limit: 5
      backoff: { duration: 10s, factor: 2, maxDuration: 5m }
